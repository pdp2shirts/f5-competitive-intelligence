ortiEndpoint capabilities for the AI era, adding AI visibility and governance to control sanctioned and unsanctioned AI apps, agents, and tools on endpoints and curb shadow AI. Native data loss prevention inspects data exchanged with AI apps and web services to prevent leakage of PII, IP, and financial data. FortiAI-Assist enables natural-language incident investigation, summaries, and high-risk device identification, while adaptive zero-trust continuously scores endpoint risk to adjust access. Delivered via one agent, console, and license within the Security Fabric, with availability expected in Q3 2026.", "type": "Product Launch", "date": "2026-07-15", "source_url": "https://www.helpnetsecurity.com/2026/07/15/fortinet-fortiai-assist/"}]}, "Cisco": {"category": "Platforms", "announcements": [{"title": "Cisco Secure Firewall 6160 Sets AI-Scale Benchmark in NetSecOPEN Testing", "summary": "Cisco announced third-party NetSecOPEN test results for its Secure Firewall 6160, which achieved inspected throughput beyond the test tools' measurement capacity and a 100% threat block rate across 5,388 scenarios, including 1,380 public CVEs and 3,809 malware samples. Testers recorded 269.59 Gbps inspected HTTP throughput, 5.6 million concurrent connections, and a new 5X throughput benchmark for its class. Cisco positions the firewall as cost-effective, using up to 80% less rack space and 60% less power, scalable to 8 Tbps of inspected throughput in clustered deployments with Talos threat intelligence.", "type": "Product Launch", "date": "2026-07-15", "source_url": "https://blogs.cisco.com/security/we-third-party-tested-our-firewall-built-for-ai-scale-the-test-tools-hit-their-limit-first"}]}, "Cisco ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Cisco Warns AI Will Triple Enterprise Network Traffic Within Three Years", "summary": "Cisco and industry researchers warned that AI adoption, driven by tools like Microsoft Copilot and ChatGPT Enterprise, will triple s behind endpoint activity, extending endpoint intelligence into the Zero Trust Exchange. Benefits include enriched detections by correlating endpoint processes with network activity, stronger policy enforcement, faster incident response, and reduced blind spots. Enriched security logs are available via the Zscaler Nano Streaming Service for analysis and automation. The feature complements EDR/XDR, fills visibility gaps, and helps teams assess risk to make smarter real-time trust decisions.", "type": "Product Launch", "date": "2026-07-15", "source_url": "https://www.zscaler.com/blogs/product-insights/empower-security-teams-extend-visibility-endpoint-context"}]}, "Zscaler ~AS": {"category": "Application Security", "announcements": [{"title": "Zscaler Launches Autonomous Application Shield for Private Apps", "summary": "Zscaler announced Autonomous Application Shield, a capability that continuously and automatically defends private applications without patches. It constantly assesses each private app's risk profile and exposure in real time, applying only the necessary protections per application rather than blanket rules. Leveraging global threat intelligence and machine learning, it adapts protections as threats evolve and as developers release new app versions, with no manual policy tuning. Zscaler says it reduces the window between vulnerability disclosure and protection from weeks to moments, marking a move toward machine-speed, AI-driven security for private applications.", "type": "Product Launch", "date": "2026-07-15", "source_url": "https://www.zscaler.com/de/blogs/product-insights/patch-window-gone-your-applications-need-defend-themselves"}]}, "Check Point Software ~AI": {"category": "AI Security", "announcements": [{"title": "Check Point Research: AI Has Crossed from Assistant to Operator in Cyberattacks", "summary": "Check Point Research released its Annual AI Security Report 2026, warning that AI has moved from assisting attackers to autonomously operating live cyber intrusions with minimal human input. It cited a breach of nine Mexican government agencies where one operator used Claude Code and GPT-4.1 to execute 5,317 AI-driven commands over 34 sessions. The report notes the vulnerability window has shrunk from days to hours, high-risk enterprise AI prompts have doubled year over year, and deepfake and synthetic identity threats are amplifying attack surfaces. It urges organizations to govern AI usage, secure AI systems, and defend at machine speed.", "type": "Research Report", "date": "2026-07-15", "source_url": "https://www.checkpoint.com/press-releases/check-point-research-ai-has-crossed-from-assistant-to-operator-rewriting-the-rules-of-autonomous-ai-cyber-attack-and-defense/"}]}, "Cloudflare": {"category": "Platforms", "announcements": []}, "AWS": {"category": "Platforms", "announcements": [{"title": "AWS Lambda Announces Self-Managed Code Storage", "summary": "AWS announced that Lambda now supports self-managed code storage using customers' own Amazon S3 buckets, referencing code directly rather than copying deployment packages. The change eliminates the previous per-Region 75GB storage cap, letting customers store as much as their bucket allows, and raises the default Lambda-managed storage limit from 75GB to 300GB per Region per account. There are no extra charges beyond standard S3 storage and potential cross-Region transfer fees. Available in all commercial AWS Regions, it is enabled by setting S3ObjectStorageMode to REFERENCE via CLI, CloudFormation, SAM, SDKs, or the console.", "type": "Product Update", "date": "2026-07-15", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/07/lambda-self-managed-code-storage/"}, {"title": "Amazon CloudWatch Logs Introduces Intelligent Tiering for Storage", "summary": "AWS announced CloudWatch Logs Intelligent-Tiering, which automatically moves log data across Standard, Infrequent Access, and Archive Instant Access tiers based on usage. Data not accessed for 30 days moves to Infrequent Access and after 90 days to Archive Instant Access, while accessing older data promotes it back to Standard for 30 days. Benefits include lower storage costs for long-retention logs without exporting or filtering, a unified query experience across all tiers, and reduced MTTR by keeping logs centralized. It is enabled at the account level in all commercial AWS regions except Bahrain and UAE.", "type": "Product Update", "date": "2026-07-15", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/07/amazon-cloudwatch-intelligent-tiering/"}]}, "HiddenLayer": {"category": "AI Security", "announcements": [{"title": "HiddenLayer Integrates Runtime Security with TrueFoundry AI Gateway", "summary": "HiddenLayer announced a runtime security integration with the TrueFoundry AI Gateway, letting enterprises apply HiddenLayer Runtime Security to any model behind the gateway from a central place with no per-model engineering. The gateway calls HiddenLayer on ingress and egress, inspecting each interaction in real time to block prompt injections and jailbreaks and redact sensitive data such as emails and phone numbers, with Allow, Block, or Redact decisions enforced immediately. Policies are managed in the AISec Platform Console, providing centralized control and a complete audit trail across models and environments with minimal developer disruption.", "type": "Partnership", "date": "2026-07-15", "source_url": "https://www.truefoundry.com/blog/hiddenlayer-integration-with-truefoundry-ai-gateway"}]}, "Lasso Security": {"category": "AI Security", "announcements": []}, "Operant AI": {"category": "AI Security", "announcements": []}, "Pillar Security": {"category": "AI Security", "announcements": []}, "Mindgard": {"category": "AI Security", "announcements": []}, "Akamai ~AS": {"category": "Application Security", "announcements": [{"title": "Akamai SOTI Report: Commerce Becomes the Epicenter for AI Bot Attacks and Agentic Fraud", "summary": "Akamai released its State of the Internet report, Securing the Agentic Storefront, finding commerce is now the most-targeted industry as agentic AI reshapes threats. As of December 2025, AI bots accounted for 47.9% of global commerce traffic on Akamai's network, with training crawlers driving over 70% of AI bot triggers. The report flags persistent Layer 7 DDoS (nearly 3 trillion attacks on commerce in 2025), web and API exploits (85% of respondents had an API incident), and rising agentic fraud including hijacked AI assistants and synthetic identities. It urges 'agentic readiness' to welcome legitimate AI while blocking malicious bots.", "type": "Research Report", "date": "2026-07-15", "source_url": "https://www.stocktitan.net/news/AKAM/akamai-research-commerce-becomes-the-epicenter-for-ai-bot-attacks-ibdaybxv93ls.html"}]}, "Akamai ~AI": {"category": "AI Security", "announcements": [{"title": "Akamai Joins WWT's ARMOR AI Security Framework for NVIDIA Systems", "summary": "Akamai became a strategic partner in World Wide Technology's ARMOR AI Readiness Model, integrating its security into WWT's vendor-neutral framework for securing AI deployments across governance, model security, infrastructure, and data protection. Akamai contributes network segmentation, API security, and DDoS protection via Prolexic, with integration into NVIDIA BlueField DPUs to offload security from host CPUs and reduce the 'security tax' on AI training and inference. In tests, the approach accelerated ransomware containment by an average of 21.4%. The architecture positions Akamai's protections as an enforcement layer to contain threats across AI clusters spanning on-prem, private, and public cloud.", "type": "Partnership", "date": "2026-07-15", "source_url": "https://securitybrief.news/story/akamai-joins-wwt-ai-security-model-for-nvidia-systems"}]}, "Fastly": {"category": "Application Delivery (ADCs)", "announcements": []}, "Citrix (NetScaler)": {"category": "Application Delivery (ADCs)", "announceme ALL_ANN.sort(function(a,b){if(a.date<b.date)return 1;if(a.date>b.date)return -1;return 0;});

document.getElementById("exportBtn").addEventListener("click",function(){
  var rows=["Date,Competitor,Category,Type,Title,Summary,Source URL"];
  for(var i=0;i<ALL_ANN.length;i++){var a=ALL_ANN[i];rows.push([a.date,q(a.competitor),q(a.category),q(a.type),q(a.title),q(a.summary),a.source_url].join(","));}
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});var lnk=document.createElement("a");lnk.href=URL.createObjectURL(blob);lnk.download="f5_daily_2026-07-15.csv";lnk.click();
});
function q(s){return '"'+String(s).replace(/"/g,'""')+'"';}

var pL={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{family:"Segoe UI,system-ui,sans-serif",color:"#e2e4ea",size:12},margin:{t:40,b:10,l:10,r:10},showlegend:true,legend:{font:{size:11},orientation:"v",x:1.02,y:0.5}};
var cl=Object.keys(compCounts),cv=[];for(var i=0;i<cl.length;i++)cv.push(compCounts[cl[i]]);
if(cl.length>0){
  Plotly.newPlot("chart-competitor",[{type:"pie",labels:cl,values:cv,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:cCL.slice(0,cl.length),line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Competitor",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-competitor").on("plotly_click",function(d){showCompetitor(d.points[0].label);});
}else{document.getElementById("chart-competitor").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No competitor announcements today</div>';}

var catL=[],catV=[],catC=[];var ck=Object.keys(catCounts);
for(var i=0;i<ck.length;i++){if(catCounts[ck[i]]>0){catL.push(ck[i]);catV.push(catCounts[ck[i]]);catC.push(catColors[ck[i]]||"#888");}}
if(catL.length>0){
  Plotly.newPlot("chart-category",[{type:"pie",labels:catL,values:catV,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:catC,line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Category",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-category").on("plotly_click",function(d){showCategory(d.points[0].label);});
}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");
function clearStatActive(){document.querySelectorAll(".stat-card").forEach(function(e){e.classList.remove("active");});}
function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function annCardHTML(a,showComp){
  var t='<span class="ann-type">'+esc(a.type)+'</span>';
  if(showComp)t+='<span class="ann-comp-tag">'+esc(a.competitor)+'</span>';
  t+='<span class="ann-date-tag">'+fmtDate(a.date)+'</span>';
  return '<div class="ann-card"><div>'+t+'</div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';
}

document.querySelectorAll(".stat-card").forEach(function(el){el.addEventListener("click",function(){var a=this.dataset.action;if(a==="stat-tracked")showStatTracked();else if(a==="stat-ann")showStatAnn();else if(a==="stat-active")showStatActive();else if(a==="stat-cats")showStatCats();});});
panel.addEventListener("click",function(e){
  var c=e.target.closest(".comp-card:not(.inactive)");if(c&&c.dataset.comp){showCompetitor(c.dataset.comp);return;}
  var cc=e.target.closest(".cat-card");if(cc&&cc.dataset.cat){showCategory(cc.dataset.cat);return;}
  var cl2=e.target.closest("[data-showcomp]");if(cl2){showCompetitor(cl2.dataset.showcomp);return;}
  var bc=e.target.closest("[data-nav]");if(bc){if(bc.dataset.nav==="overview")showOverview();else if(bc.dataset.nav==="categories")showStatCats();}
});

function annsForBase(bn){var arr=[];for(var k=0;k<names.length;k++){if(baseName(names[k])===bn){var inf=DATA[names[k]];for(var m=0;m<inf.announcements.length;m++)arr.push(inf.announcements[m]);}}return arr;}

function showOverview(){clearStatActive();
  var h='<h2>Daily Briefing <span class="badge">'+ALL_ANN.length+' announcements</span></h2>';
  h+='<div class="section-label">Competitors with News Today</div>';
  for(var i=0;i<baseNames.length;i++){var bn=baseNames[i];if(baseActive[bn]){h+='<div class="comp-card" data-comp="'+esc(bn)+'"><div><div class="name">'+esc(bn)+'</div><div class="cat">'+esc(baseCatMap[bn].join(", "))+'</div></div><div class="count">'+compCounts[bn]+'</div></div>';}}
  h+='<div class="section-label">No News Today</div>';
  for(var i=0;i<baseNames.length;i++){var bn=baseNames[i];if(!baseActive[bn]){h+='<div class="comp-card inactive"><div><div class="name">'+esc(bn)+'</div><div class="cat">'+esc(baseCatMap[bn].join(", "))+'</div></div><div class="no-ann">none</div></div>';}}
  panel.innerHTML=h;
}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+baseNames.length+'</span></h2>';
  for(var i=0;i<baseNames.length;i++){var bn=baseNames[i],act=!!baseActive[bn],cnt=compCounts[bn]||0,cls=act?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(bn)+'"><div><div class="name"><span class="status-dot '+(act?"status-active":"status-inactive")+'"></span>'+esc(bn)+'</div><div class="cat">'+esc(baseCatMap[bn].join(", "))+'</div></div>'+(act?'<div class="count">'+cnt+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<baseNames.length;i++){if(baseActive[baseNames[i]])sorted.push([baseNames[i],compCounts[baseNames[i]]]);}
  sorted.sort(function(a,b){return b[1]-a[1];});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(baseCatMap[sorted[i][0]].join(", "))+'</div></div><div class="count">'+sorted[i][1]+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<baseNames.length;i++){if(!baseActive[baseNames[i]])h+='<span class="inactive-chip">'+esc(baseNames[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category,bn=baseName(names[i]);if(!allCats[cat])allCats[cat]={comps:{},ann:0};if(DATA[names[i]].announcements.length>0)allCats[cat].comps[bn]=1;allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888",ncomp=Object.keys(d.comps).length;
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+ncomp+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var bn=baseName(name);if(baseSet[bn]!==1)return;
  var anns=annsForBase(bn),cats=baseCatMap[bn]||[];
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(bn)+'</span></div>';
  h+='<h2>'+esc(bn)+' <span class="badge">'+anns.length+' announcement'+(anns.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(cats.join(", "))+'</strong></p>';
  if(anns.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<anns.length;i++){var a=anns[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var actMap={},inactMap={};
  for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){var bn=baseName(names[i]);if(DATA[names[i]].announcements.length>0){if(!actMap[bn])actMap[bn]=[];for(var m=0;m<DATA[names[i]].announcements.length;m++)actMap[bn].push(DATA[names[i]].announcements[m]);}else{inactMap[bn]=1;}}}
  var actKeys=Object.keys(actMap);var total=0;for(var i=0;i<actKeys.length;i++)total+=actMap[actKeys[i]].length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<actKeys.length;i++){var bn=actKeys[i],list=actMap[bn];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(bn)+'">'+esc(bn)+' ('+list.length+') &#8599;</div>';
    for(var j=0;j<list.length;j++){var a=list[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inactKeys=Object.keys(inactMap);
  if(inactKeys.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inactKeys.length;i++)h+='<span class="inactive-chip">'+esc(inactKeys[i])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}
showOverview();
})();
</script>
</body>
</html>
