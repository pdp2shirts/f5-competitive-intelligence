.stat-card .num{font-size:32px;font-weight:700;color:var(--accent)}

.stat-card:hover .hint{opacity:1}
.main{display:flex;gap:0;min-height:calc(100vh - 180px)}
.charts-panel{flex:0 0 50%;padding:24px 20px 24px 40px;display:flex;flex-direction:column;gap:16px}

.ann-card:hover{border-color:var(--accent)}
.ann-card .ann-title{font-size:15px;font-weight:600;margin-bottom:8px}
.ann-card .ann-type{display:inline-block;background:rgba(118,185,0,.15);color:var(--accent);font-size:11px;font-weight:600;padding:2px 10px;border-radius:12px;margin-bottom:10px}
.ann-card .ann-comp-tag{display:inline-block;background:rgba(0,180,216,.15);color:var(--accent2);font-size:11px;font-weight:600;padding:2px 10px;border-radius:12px;margin-bottom:10px;margin-left:6px}
.ann-card .ann-date-tag{display:inline-block;background:rgba(255,255,255,.06);color:var(--muted);font-size:11px;font-weight:600;padding:2px 10px;border-radius:12px;margin-bottom:10px;margin-left:6px}
.ann-card .ann-summary{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.ann-card .source-link{display:inline-flex;align-items:center;gap:4px;color:var(--accent2);font-size:12px;text-decoration:none;font-weight:500}

.comp-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s,background .2s}
.comp-card:hover{border-color:var(--accent);background:var(--card)}
.comp-card .name{font-size:14px;font-weight:600}
.comp-card .cat{font-size:11px;color:var(--muted);margin-top:2px}
.comp-card .count{background:var(--accent);color:#000;font-size:12px;font-weight:700;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.comp-card .no-ann{color:var(--muted);font-size:11px;font-style:italic}
.comp-card.inactive{opacity:.5;cursor:default}
.comp-card.inactive:hover{border-color:var(--border);background:var(--surface)}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s,background .2s}
.cat-card:hover{border-color:var(--accent);background:var(--card)}
.cat-card .cat-name{font-size:14px;font-weight:600}
.cat-card .cat-meta{font-size:11px;color:var(--muted);margin-top:2px}
.cat-card .cat-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.pill{font-size:11px;padding:2px 10px;border-radius:12px;font-weight:600}
.pill-ann{background:rgba(118,185,0,.15);color:var(--accent)}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:20px 0 8px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.status-active{background:var(--accent)}.status-inactive{background:#444}
.inactive-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.inactive-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--muted)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
</style>

<script>
(function(){
"use strict";
var DATA={"Palo Alto Networks": {"category": "Platforms", "announcements": [{"title": "Unit 42 Warns of Active Exploitation of PAN-OS CVE-2026-0257", "summary": "Palo Alto Networks' Unit 42 published a threat brief on June 5, 2026 reporting active exploitation of CVE-2026-0257, a GlobalProtect authentication-bypass flaw in vulnerable PAN-OS portal and gateway components. Threat actors attempted to bypass authentication and establish VPN sessions on unpatched devices, though no lateral movement was observed. The CVE was added to CISA's Known Exploited Vulnerabilities catalog. Palo Alto urged customers to apply mitigations, upgrade to fixed versions, and use Cortex Xpanse to identify exposed GlobalProtect portals.", "type": "Security Advisory", "date": "2026-06-05", "source_url": "https://unit42.paloaltonetworks.com/active-exploitation-of-pan-os-cve-2026-0257/"}]}, "Fortinet": {"category": "Platforms", "announcements": []}, "Cisco": {"category": "Platforms", "announcements": []}, "CrowdStrike": {"category": "Platforms", "announcements": []}, "Zscaler": {"category": "Platforms", "announcements": [{"title": "Zscaler and HCLTech Launch Post-Quantum Cryptography Readiness Offering", "summary": "On June 7, 2026, Zscaler and HCLTech unveiled a joint post-quantum cryptography (PQC) offering to counter 'harvest-now, decrypt-later' threats. Zscaler now supports hybrid PQC key exchange using ML-KEM for real-time, PQC-capable traffic inspection via ZIA, protecting the last mile even when destination servers lack PQC support. It extends PQC to IPsec with post-quantum pre-shared keys and provides FIPS 203-compliant TLS logging to identify clients that are not yet quantum-ready. HCLTech adds service-led cryptographic discovery, building a CryptoBOM to drive prioritized remediation toward quantum-resistant cryptography.", "type": "Partnership", "date": "2026-06-07", "source_url": "https://quantumzeitgeist.com/hcltech-zscaler-pqc-offering-amid/"}]}, "Check Point Software": {"category": "Platforms", "announcements": []}, "Cloudflare": {"category": "Platforms", "announcements": [{"title": "Cloudflare Extends Zero Trust Gateway Policies to Workers Egress Traffic", "summary": "In a June 5, 2026 changelog, Cloudflare announced that Workers using a VPC Network binding can now egress to public Internet destinations through Cloudflare Gateway, extending existing Zero Trust DNS, HTTP, Network, and egress policies to Worker-originated traffic just as they apply to WARP users. Worker egress now appears in Gateway logs and is subject to allow/block, DNS category filtering, and HTTP destination rules. The same week Cloudflare also shipped self-managed OAuth clients and saga-style rollback support in Workflows, deepening platform governance and developer controls.", "type": "Product Update", "date": "2026-06-05", "source_url": "https://developers.cloudflare.com/changelog/post/2026-06-05-gateway-egress/"}]}, "AWS": {"category": "Platforms", "announcements": [{"title": "AWS Deploys Resilient Network Graphs (RNG) to Cut Data Center Networking Energy 40%", "summary": "Reported June 5, 2026, AWS detailed Resilient Network Graphs (RNG), a new data center network design replacing the traditional fat-tree topology with a quasi-random graph and a 'Spraypoint' multi-path routing algorithm, plus a 'ShuffleBox' device to simplify cabling. AWS claims up to 33% higher throughput using roughly 69% fewer switch-routers and an estimated 40% reduction in networking electricity use. In production for most new non-GPU data centers since April 2026 after pilots in Ireland, Germany, and Spain, RNG degrades gracefully under router loss; GPU/AI training workloads remain on UltraServer architectures.", "type": "Infrastructure", "date": "2026-06-05", "source_url": "https://www.infoq.com/news/2026/06/aws-random-graph-data-center/"}]}, "HiddenLayer": {"category": "AI Security", "announcements": []}, "Lasso Security": {"category": "AI Security", "announcements": []}, "Operant AI": {"category": "AI Security", "announcements": []}, "Pillar Security": {"category": "AI Security", "announcements": []}, "Mindgard": {"category": "AI Security", "announcements": []}, "Akamai": {"category": "Application Delivery (ADCs)", "announcements": []}, "Fastly": {"category": "Application Delivery (ADCs)", "announcements": []}, "Citrix (NetScaler)": {"category": "Application Delivery (ADCs)", "announcements": []}, "A10 Networks": {"category": "Application Delivery (ADCs)", "announcements": []}, "Arista Networks": {"category": "AI Data Delivery", "announcements": []}, "HPE / Juniper Networks": {"category": "AI Data Delivery", "announcements": []}, "Radware": {"category": "Application Security", "announcements": []}, "Barracuda Networks": {"category": "Application Security", "announcements": []}, "Imperva (Thales)": {"category": "Application Security", "announcements": []}, "Cloudflare ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Cloudflare Adds Spend Limits and Identity-Driven Budgets to AI Gateway", "summary": "On June 5, 2026, Cloudflare introduced real-time spend controls for its AI Gateway, giving organizations dollar-based budgets that track cumulative spend across all AI requests independent of rate limits, now in open beta for all users. A closed beta adds identity-driven budgets that attribute usage per user and enforce team policies using IdP groups via Cloudflare Access and OAuth, with no custom code required. Limits can be configured by model, provider, or custom attributes, helping enterprises prevent runaway AI token costs while routing inference traffic through a single managed AI gateway.", "type": "Product Launch", "date": "2026-06-05", "source_url": "https://blog.cloudflare.com/ai-gateway-spend-limits/"}]}, "Cloudflare ~AD": {"category": "Application Delivery (ADCs)", "announcements": [{"title": "Cloudflare Hit by Dallas Hardware Fault and Recurring TLS Certificate Bug Over Weekend", "summary": "Over the June 6-7, 2026 weekend, Cloudflare experienced two distinct failures. A hardware fault at its Dallas data center on June 6 caused elevated HTTP 500 errors and higher latency for about 20 minutes, confined to Dallas without affecting the global edge. Separately, a recurring TLS certificate issue (June 5-6) involving Let's Encrypt certificates with an unsupported CA bundle configuration broke TLS handshakes for some users; Cloudflare fixed the chain and committed to automatically rebuilding impacted certificate chains. The incidents renewed scrutiny of single-provider CDN/DNS dependency risks.", "type": "Incident", "date": "2026-06-07", "source_url": "https://www.techtimes.com/articles/317936/20260607/cloudflare-outage-dallas-hardware-fault-recurring-tls-bug-strike-one-weekend.htm"}]}, "Akamai ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Akamai Expands NVIDIA Partnership to Embed Zero Trust Security Inside AI Factories", "summary": "In coverage dated June 6, 2026, Akamai detailed an expanded NVIDIA collaboration that embeds Zero Trust security directly into AI factory infrastructure. The integration merges Akamai Guardicore Segmentation with NVIDIA Vera BlueField-4 STX and the NVIDIA DOCA platform to enforce workload-aware, real-time segmentation in the infrastructure rather than on the host. This enables containment and threat detection at line speed, protecting data, context memory, and autonomous agent workloads without impacting AI compute, storage, or GPU performance. Availability for AI factory deployment is expected in H2 2026, with storage/infrastructure integrations following in H1 2027.", "type": "Partnership", "date": "2026-06-06", "source_url": "https://pulse2.com/akamai-expands-nvidia-partnership-to-bring-zero-trust-security-into-ai-factories/"}]}};
var catColors={"Platforms":"#636efa","AI Security":"#ef553b","AI Data Delivery":"#00cc96","Application Delivery (ADCs)":"#ab63fa","Application Security":"#ffa15a"};
var cCL=["#76b900","#00b4d8","#ef553b","#ab63fa","#ffa15a","#19d3f3","#ff6692","#636efa","#00cc96","#b6e880","#ff97ff"];
var ALL_ANN=[],names=Object.keys(DATA),compCounts={},catCounts={};
for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],n=info.announcements.length;
  if(n>0)compCounts[nm]=n;
  if(!catCounts[info.category])catCounts[info.category]=0;
  catCounts[info.category]+=n;
  for(var j=0;j<n;j++){var a=info.announcements[j];ALL_ANN.push({title:a.title,summary:a.summary,source_url:a.source_url,type:a.type,date:a.date,competitor:nm,category:info.category});}}

document.getElementById("exportBtn").addEventListener("click",function(){
  var rows=["Date,Competitor,Category,Type,Title,Summary,Source URL"];
  for(var i=0;i<ALL_ANN.length;i++){var a=ALL_ANN[i];rows.push([a.date,q(a.competitor),q(a.category),q(a.type),q(a.title),q(a.summary),a.source_url].join(","));}
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});var lnk=document.createElement("a");lnk.href=URL.createObjectURL(blob);lnk.download="f5_daily_2026-06-08.csv";lnk.click();
});
function q(s){return '"'+String(s).replace(/"/g,'""')+'"';}

var pL={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{family:"Segoe UI,system-ui,sans-serif",color:"#e2e4ea",size:12},margin:{t:40,b:10,l:10,r:10},showlegend:true,legend:{font:{size:11},orientation:"v",x:1.02,y:0.5}};
var cl=Object.keys(compCounts),cv=[];for(var i=0;i<cl.length;i++)cv.push(compCounts[cl[i]]);
if(cl.length>0){
  Plotly.newPlot("chart-competitor",[{type:"pie",labels:cl,values:cv,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:cCL.slice(0,cl.length),line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Competitor",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-competitor").on("plotly_click",function(d){showCompetitor(d.points[0].label);});
}else{document.getElementById("chart-competitor").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No competitor announcements today</div>';}

var catL=[],catV=[],catC=[];var ck=Object.keys(catCounts);
for(var i=0;i<ck.length;i++){if(catCounts[ck[i]]>0){catL.push(ck[i]);catV.push(catCounts[ck[i]]);catC.push(catColors[ck[i]]||"#888");}}
if(catL.length>0){
  Plotly.newPlot("chart-category",[{type:"pie",labels:catL,values:catV,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:catC,line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Category",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-category").on("plotly_click",function(d){showCategory(d.points[0].label);});
}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");
function clearStatActive(){document.querySelectorAll(".stat-card").forEach(function(e){e.classList.remove("active");});}
function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function annCardHTML(a,showComp){
  var t='<span class="ann-type">'+esc(a.type)+'</span>';
  if(showComp)t+='<span class="ann-comp-tag">'+esc(a.competitor)+'</span>';
  t+='<span class="ann-date-tag">'+fmtDate(a.date)+'</span>';
  return '<div class="ann-card"><div>'+t+'</div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';
}

document.querySelectorAll(".stat-card").forEach(function(el){el.addEventListener("click",function(){var a=this.dataset.action;if(a==="stat-tracked")showStatTracked();else if(a==="stat-ann")showStatAnn();else if(a==="stat-active")showStatActive();else if(a==="stat-cats")showStatCats();});});
panel.addEventListener("click",function(e){
  var c=e.target.closest(".comp-card:not(.inactive)");if(c&&c.dataset.comp){showCompetitor(c.dataset.comp);return;}
  var cc=e.target.closest(".cat-card");if(cc&&cc.dataset.cat){showCategory(cc.dataset.cat);return;}
  var cl2=e.target.closest("[data-showcomp]");if(cl2){showCompetitor(cl2.dataset.showcomp);return;}
  var bc=e.target.closest("[data-nav]");if(bc){if(bc.dataset.nav==="overview")showOverview();else if(bc.dataset.nav==="categories")showStatCats();}
});

function showOverview(){clearStatActive();
  var h='<h2>Daily Briefing <span class="badge">'+ALL_ANN.length+' announcements</span></h2>';
  h+='<div class="section-label">Competitors with News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length>0)h+='<div class="comp-card" data-comp="'+esc(nm)+'"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="count">'+info.announcements.length+'</div></div>';}
  h+='<div class="section-label">No News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length===0)h+='<div class="comp-card inactive"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="no-ann">none</div></div>';}
  panel.innerHTML=h;
}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+names.length+'</span></h2>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],cls=info.announcements.length>0?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(nm)+'"><div><div class="name"><span class="status-dot '+(info.announcements.length>0?"status-active":"status-inactive")+'"></span>'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div>'+(info.announcements.length>0?'<div class="count">'+info.announcements.length+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length>0)sorted.push([names[i],DATA[names[i]]]);}
  sorted.sort(function(a,b){return b[1].announcements.length-a[1].announcements.length;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(sorted[i][1].category)+'</div></div><div class="count">'+sorted[i][1].announcements.length+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length===0)h+='<span class="inactive-chip">'+esc(names[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category;if(!allCats[cat])allCats[cat]={comps:[],ann:0};allCats[cat].comps.push(names[i]);allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888";
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+d.comps.length+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var info=DATA[name];if(!info)return;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(name)+'</span></div>';
  h+='<h2>'+esc(name)+' <span class="badge">'+info.announcements.length+' announcement'+(info.announcements.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(info.category)+'</strong></p>';
  if(info.announcements.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<info.announcements.length;i++){var a=info.announcements[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var comps=[],active=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){comps.push([names[i],DATA[names[i]]]);if(DATA[names[i]].announcements.length>0)active.push([names[i],DATA[names[i]]]);}}
  var total=0;for(var i=0;i<comps.length;i++)total+=comps[i][1].announcements.length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<active.length;i++){var nm=active[i][0],inf=active[i][1];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(nm)+'">'+esc(nm)+' ('+inf.announcements.length+') &#8599;</div>';
    for(var j=0;j<inf.announcements.length;j++){var a=inf.announcements[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inact=comps.filter(function(c){return c[1].announcements.length===0;});
  if(inact.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inact.length;i++)h+='<span class="inactive-chip">'+esc(inact[i][0])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}

showOverview();
})();
</script>
</body>
</html>
