nd claims-oriented risk modeling to help boards identify, prioritize and remediate AI-related exposures, moving beyond technical defense toward coordinated remediation and financial risk protection.", "type": "Partnership", "date": "2026-06-01", "source_url": "https://ibsintelligence.com/ibsi-news/crowdstrike-expands-quiltworks-for-frontier-ai-risk/"}]}, "Zscaler": {"category": "Platforms", "announcements": [{"title": "How the Zscaler Zero Trust Firewall Stops AI-Driven Attacks", "summary": "Zscaler detailed how its Zero Trust Firewall defends against faster, more adaptive AI-driven attacks by disrupting the attack chain at multiple points rather than relying on a single inspection step. The approach makes assets harder to discover, conceals malicious communication and hinders lateral movement, with DNS security innovations positioned as part of the broader Zero Trust Exchange strategy.", "type": "Product Insight", "date": "2026-06-01", "source_url": "https://www.zscaler.com/blogs/product-insights/how-zscaler-zero-trust-firewall-protects-against-ai-driven-attacks"}]}, "Cloudflare": {"category": "AI Data Delivery", "announcements": [{"title": "Cloudflare Agents Week 2026: Building the Agentic Cloud", "summary": "During Agents Week 2026, Cloudflare previewed the next edition of its Agents SDK, evolving from lightweight primitives into a full platform for AI agents that think, act and persist. The week also introduced a network performance update featuring shared compression dictionaries to speed page loads, alongside expanded agent toolbox, compute and security capabilities for the emerging agentic web.", "type": "Product Update", "date": "2026-06-01", "source_url": "https://www.cloudflare.com/agents-week/updates/"}]}, "Akamai": {"category": "AI Data Delivery", "announcements": [{"title": "Akamai Launches AI Brand Presence to Boost Visibility in Agentic Search", "summary": "Akamai launched AI Brand Presence, a service that helps brands optimize content for AI search and agentic traffic by translating site content for LLMs and AI agents while monitoring bot activity and securing at the edge. In its own pilot, Akamai saw an 85% increase in citations and a 364% rise in brand presence. The service is rolling out in phases to select North American customers.", "type": "Product Launch", "date": "2026-06-01", "source_url": "https://cxotoday.com/ai/akamai-launches-ai-brand-presence-to-boost-visibility-in-agentic-search/"}]}, "AWS": {"category": "AI Data Delivery", "announcements": [{"title": "Amazon Quick Adds VPC Connectivity for MCP Connections", "summary": "AWS announced that Amazon Quick now supports VPC connectivity for Model Context Protocol (MCP) connections, letting enterprises link privately hosted MCP servers on EC2, Fargate, AgentCore or other private networks without exposing them to the public internet. During connector setup, customers select the VPC connection so traffic between Quick and the private MCP server stays inside customer-controlled networks. It is available in all Regions where Amazon Quick is offered.", "type": "Product Update", "date": "2026-06-01", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/06/amazon-quick-vpc-mcp/"}, {"title": "AWS Makes Flat Network Design Default for New Data Centers", "summary": "AWS detailed a shift to a quasi-random flat network design (resilient network graphs) as the default for most new data centers, moving away from traditional fat-tree topologies. Combined with Spraypoint routing and ShuffleBox interconnects, the design reportedly uses 69% fewer routers, delivers up to 33% higher throughput and cuts network power roughly 40%, improving resilience for AI-scale workloads. A first live deployment near Dublin validated performance ahead of broader rollout.", "type": "Infrastructure", "date": "2026-06-01", "source_url": "https://datacenter.news/story/aws-makes-flat-network-design-default-for-new-data-centres"}]}, "HPE / Juniper Networks": {"category": "AI Data Delivery", "announcements": [{"title": "HPE Reports Fiscal Q2 2026 Results with Juniper Integration in Focus", "summary": "HPE reported fiscal Q2 2026 results with strong profitability and cash generation, driven by ahead-of-schedule Juniper Networks and Catalyst cost synergies. Networking, powered by Juniper and Mist AI, is HPE's fastest-growing segment, with attention on GreenLake AI bookings and enterprise AI adoption. Management raised fiscal 2026 guidance and introduced a fiscal 2027 growth framework, signaling confidence in integration progress.", "type": "Financial Results", "date": "2026-06-01", "source_url": "https://businesstech.news/hpe-earnings-juniper-integration-ai-networking-june-2026/"}]}, "A10 Networks": {"category": "Application Delivery (ADCs)", "announcements": [{"title": "A10 Networks Launches Integrated AI and Security Solutions", "summary": "A10 Networks unveiled new integrated AI and security solutions, including an AI-ready ACOS platform that interfaces with AI inference and GenAI environments to improve throughput and lower latency. The company previewed A10 Control, a centralized management platform for Thunder ADC and Defend products, and expanded the A10 Defend portfolio with AI-powered bot protection and enhanced cloud and on-premises DDoS defenses to reduce risk and simplify IT operations.", "type": "Product Launch", "date": "2026-06-01", "source_url": "https://medtechspectrum.com/news/31/23595/a10-networks-launches-integrated-ai-and-security-solutions-to-strengthen-cybersecurity-in-healthcare-and-beyond.html"}]}, "Fastly": {"category": "Application Security", "announcements": [{"title": "Fastly Expands Bot Management and API Security in Q1 2026 Update", "summary": "In its Q1 2026 investor supplement, Fastly highlighted security product expansions including Bot Management with Content Guard to block unauthorized AI bots and protect intellectual property, and enhanced API Security with prioritization tools, bulk actions and CI/CD integrations for API Discovery to surface shadow APIs. Fastly also launched an Agent Toolkit for AI coding agents. Security revenue grew 47% year over year to 22% of total.", "type": "Product Update", "date": "2026-06-01", "source_url": "https://investors.fastly.com/static-files/68e0e0b1-bb3a-42fd-be1d-b826a1741d98"}]}, "Radware": {"category": "Application Security", "announcements": [{"title": "Radware Reports Q1 2026 Results with Cloud Security Momentum", "summary": "Radware reported Q1 2026 revenue of $79.8 million, up 11% year over year and a fourth straight quarter of double-digit growth. Cloud ARR rose 23% to $98 million (39% of total ARR), with Americas revenue up 40%. The company highlighted MSSP ecosystem expansion, a new Chief Telecom (Taiwan) partnership and its subscription-based Godshield Pro managed service. Q2 revenue guidance is $81-$82 million.", "type": "Financial Results", "date": "2026-06-01", "source_url": "https://www.fool.com/earnings/call-transcripts/2026/06/01/radware-rdwr-q1-2026-earnings-transcript/"}]}, "Citrix (NetScaler)": {"category": "Application Delivery (ADCs)", "announcements": []}, "Arista Networks": {"category": "AI Data Delivery", "announcements": []}, "Barracuda Networks": {"category": "Application Security", "announcements": []}, "Imperva (Thales)": {"category": "Application Security", "announcements": []}, "HiddenLayer": {"category": "AI Security", "announcements": []}, "Lasso Security": {"category": "AI Security", "announcements": []}, "Operant AI": {"category": "AI Security", "announcements": []}, "Pillar Security": {"category": "AI Security", "announcements": []}, "Mindgard": {"category": "AI Security", "announcements": []}};

}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");
function clearStatActive(){document.querySelectorAll(".stat-card").forEach(function(e){e.classList.remove("active");});}
function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function annCardHTML(a,showComp){
  var t='<span class="ann-type">'+esc(a.type)+'</span>';
  if(showComp)t+='<span class="ann-comp-tag">'+esc(a.competitor)+'</span>';
  t+='<span class="ann-date-tag">'+fmtDate(a.date)+'</span>';
  return '<div class="ann-card"><div>'+t+'</div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';
}

document.querySelectorAll(".stat-card").forEach(function(el){el.addEventListener("click",function(){var a=this.dataset.action;if(a==="stat-tracked")showStatTracked();else if(a==="stat-ann")showStatAnn();else if(a==="stat-active")showStatActive();else if(a==="stat-cats")showStatCats();});});
panel.addEventListener("click",function(e){
  var c=e.target.closest(".comp-card:not(.inactive)");if(c&&c.dataset.comp){showCompetitor(c.dataset.comp);return;}
  var cc=e.target.closest(".cat-card");if(cc&&cc.dataset.cat){showCategory(cc.dataset.cat);return;}
  var cl2=e.target.closest("[data-showcomp]");if(cl2){showCompetitor(cl2.dataset.showcomp);return;}
  var bc=e.target.closest("[data-nav]");if(bc){if(bc.dataset.nav==="overview")showOverview();else if(bc.dataset.nav==="categories")showStatCats();}
});

function showOverview(){clearStatActive();
  var h='<h2>Daily Briefing <span class="badge">'+ALL_ANN.length+' announcements</span></h2>';
  h+='<div class="section-label">Competitors with News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length>0)h+='<div class="comp-card" data-comp="'+esc(nm)+'"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="count">'+info.announcements.length+'</div></div>';}
  h+='<div class="section-label">No News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length===0)h+='<div class="comp-card inactive"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="no-ann">none</div></div>';}
  panel.innerHTML=h;
}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+names.length+'</span></h2>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],cls=info.announcements.length>0?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(nm)+'"><div><div class="name"><span class="status-dot '+(info.announcements.length>0?"status-active":"status-inactive")+'"></span>'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div>'+(info.announcements.length>0?'<div class="count">'+info.announcements.length+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length>0)sorted.push([names[i],DATA[names[i]]]);}
  sorted.sort(function(a,b){return b[1].announcements.length-a[1].announcements.length;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(sorted[i][1].category)+'</div></div><div class="count">'+sorted[i][1].announcements.length+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length===0)h+='<span class="inactive-chip">'+esc(names[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category;if(!allCats[cat])allCats[cat]={comps:[],ann:0};allCats[cat].comps.push(names[i]);allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888";
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+d.comps.length+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var info=DATA[name];if(!info)return;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(name)+'</span></div>';
  h+='<h2>'+esc(name)+' <span class="badge">'+info.announcements.length+' announcement'+(info.announcements.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(info.category)+'</strong></p>';
  if(info.announcements.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<info.announcements.length;i++){var a=info.announcements[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var comps=[],active=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){comps.push([names[i],DATA[names[i]]]);if(DATA[names[i]].announcements.length>0)active.push([names[i],DATA[names[i]]]);}}
  var total=0;for(var i=0;i<comps.length;i++)total+=comps[i][1].announcements.length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<active.length;i++){var nm=active[i][0],inf=active[i][1];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(nm)+'">'+esc(nm)+' ('+inf.announcements.length+') &#8599;</div>';
    for(var j=0;j<inf.announcements.length;j++){var a=inf.announcements[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inact=comps.filter(function(c){return c[1].announcements.length===0;});
  if(inact.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inact.length;i++)h+='<span class="inactive-chip">'+esc(inact[i][0])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}

showOverview();
})();
</script>
</body>
</html>
