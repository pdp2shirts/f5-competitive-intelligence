any framed accelerated remediation with defensive AI as the next frontier, arguing that vulnerability discovery alone is only part of the challenge. Shares rose about 1.95% on the news.", "type": "Product Update", "date": "2026-07-01", "source_url": "https://tradersunion.com/news/companies/show/2547955-fortinet-rises-1-95percent-to-usd156-62/"}]}, "Cisco": {"category": "Platforms", "announcements": [{"title": "Cisco Details Embedded Network Security Strategy Against AI-Driven Threats", "summary": "Cisco outlined a cohesive strategy that builds security directly into the network fabric rather than bolting it on, spanning routing, switching, wireless, cloud access and identity-aware controls. Highlights include Cisco 8000 Series Routers with built-in firewall, Cisco Multicloud Fabric for end-to-end visibility across sites and clouds, and the new Cisco Cloud Control AI-native management platform for unified orchestration. AI tools such as Cisco AI Assistant and AI Canvas aim to speed threat detection for lean IT teams.", "type": "Product Announcement", "date": "2026-07-01", "source_url": "https://blogs.cisco.com/networking/embedded-network-security-the-ultimate-defense-against-ai-driven-threats"}]}, "CrowdStrike": {"category": "Platforms", "announcements": [{"title": "CrowdStrike Named Frost & Sullivan 2026 Leader in Zero Trust Browser Security", "summary": "CrowdStrike was named Frost & Sullivan's 2026 Global Enabling Technology Leader in Zero Trust Browser Security, recognizing Falcon Secure Access, built on its Seraphic and SGNL acquisitions. The offering injects an engine-level JavaScript runtime security module to protect any browser\u2014Chrome, Edge, Safari, Firefox and emerging AI browsers\u2014across managed and unmanaged devices without routing traffic or mandating a dedicated browser. It secures access to GenAI apps and Electron tools, extending Falcon's fabric from endpoint to browser to cloud.", "type": "Award", "date": "2026-07-01", "source_url": "https://www.crowdstrike.com/en-us/press-releases/crowdstrike-named-frost-sullivan-2026-global-enabling-technology-leader-zero-trust-browsing-security/"}]}, "CrowdStrike ~AI": {"category": "AI Security", "announcements": [{"title": "CrowdStrike and AWS Expand Falcon AI Detection and Response for AI Workloads", "summary": "CrowdStrike and Amazon Web Services expanded Falcon AI Detection and Response capabilities, along with Project QuiltWorks enhancements, to secure AI workloads running on AWS. The company positioned Falcon as the central control plane for AI-era cybersecurity, deepening its enterprise AI workload coverage. Shares jumped about 12.1% following the announcement.", "type": "Partnership", "date": "2026-07-01", "source_url": "https://simplywall.st/stocks/us/software/nasdaq-crwd/crowdstrike-holdings/news/crowdstrike-crwd-is-up-121-after-aws-ai-security-expansion-a"}]}, "Zscaler ~AI": {"category": "AI Security", "announcements": [{"title": "Zscaler Expands AI Security Suite Across Zero Trust Exchange for MSPs", "summary": "Zscaler unveiled a broad expansion of AI security capabilities across its Zero Trust Exchange, targeting MSPs and MSSPs. New features include AI asset management to surface shadow AI, a Zscaler AI Broker with MCP/A2A framework and Agent Registry to govern which AI agents access resources, and an AI Access Graph via the Symmetry Systems acquisition. It also adds AI red teaming for MCP servers, a standalone prompt-hardening service, and compliance heat maps for the full AI security lifecycle.", "type": "Product Launch", "date": "2026-07-01", "source_url": "https://www.channele2e.com/news/zscaler-builds-out-ai-security-services-opportunity-for-msps"}]}, "Check Point Software": {"category": "Platforms", "announcements": [{"title": "Check Point Cloud Firewall Now Available on AWS European Sovereign Cloud", "summary": "Check Point announced that its Cloud Firewall offering is now available on the AWS European Sovereign Cloud, an independently operated, loudflare.com/content-independence-day-ai-options/"}]}, "AWS": {"category": "Platforms", "announcements": [{"title": "AWS Security Agent Expands to Mumbai, Singapore and S\u00e3o Paulo Regions", "summary": "AWS expanded the AWS Security Agent, now part of AWS Continuum, to Asia Pacific (Mumbai), Asia Pacific (Singapore) and South America (S\u00e3o Paulo). The AI-powered agent secures applications across the development lifecycle with preview features including STRIDE-based threat modeling, full-repo and PR-level code reviews across GitHub, GitLab, Bitbucket and Confluence, and on-demand penetration testing. New IDE plugins and MCP integration let teams trigger reviews from Kiro or Claude Code.", "type": "Product Update", "date": "2026-07-01", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/07/aws-security-agent-asia-pacific/"}, {"title": "AWS Artifact Adds AI-Powered Assurance Assistant for Compliance Inquiries", "summary": "AWS announced that AWS Artifact now includes Assurance Assistant, an AI-powered tool that provides citation-backed answers drawn from verified AWS compliance documents such as SOC, ISO and C5. It supports vendor risk assessments and due-diligence questionnaires, handling both single on-screen questions and bulk XLSX uploads including CAIQ and SIG. The capability is available at no extra charge in all commercial AWS Regions.", "type": "Product Launch", "date": "2026-07-01", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/07/aws-artifact-assurance-assistant/"}]}, "AWS ~AS": {"category": "Application Security", "announcements": [{"title": "Amazon GuardDuty Adds Sensitive File Modification Threat Detections", "summary": "Amazon GuardDuty Runtime Monitoring added three new threat detections that alert on sensitive file modifications across EC2, EKS and ECS workloads. The findings cover persistence, privilege escalation and defense evasion by monitoring file operations such as open-for-write, rename, symlink and unlink. Detections use correlation-based analysis with MITRE ATT&CK mappings and remediation guidance to cut false positives, available to all Runtime Monitoring customers.", "type": "Product Update", "date": "2026-07-01", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/07/amazon-guardduty-sfm/"}]}, "AWS ~AD": {"category": "Application Delivery (ADCs)", "announcements": [{"title": "AWS Certificate Manager Adds ACME Support for Automated Public Certificates", "summary": "AWS added ACMEv2 support to AWS Certificate Manager for public certificates, enabling automated issuance and renewal of public TLS certificates through the standard ACME protocol. Organizations can create dedicated ACME endpoints, set domain restrictions and assign External Account Binding with IAM, separating domain validation from certificate requests. It supports RSA 2048 and ECDSA P-256/P-384 keys with CloudTrail and CloudWatch integration, available across commercial regions.", "type": "Product Update", "date": "2026-07-01", "source_url": "https://securitybrief.news/story/amazon-web-services-adds-acme-support-to-certificate-manager"}]}, "Akamai ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Akamai Lands Record $1.8B AI Cloud Deal, Argues AI Inference Is Swallowing the Cloud", "summary": "Akamai announced a seven-year, $1.8 billion cloud computing agreement with an AI startup, the largest customer contract in its history, underscoring momentum in distributed AI infrastructure and low-latency delivery via its AI Gateway and Firewall offerings. In a same-day blog, CTO Robert Blumofe argued that AI inference is 'swallowing the cloud,' driving demand for edge inference as centralized clouds struggle to scale real-time AI agents. Akamai also joined Claroty's alliance program to expand OT security.", "type": "Business Deal", "date": "2026-07-01", "source_url": "https://finance.yahoo.com/markets/stocks/articles/akamai-akam-lands-1-8-050908804.html"}]}, "Citrix (NetScaler)": {   Plotly.newPlot("chart-category",[{type:"pie",labels:catL,values:catV,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:catC,line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Category",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-category").on("plotly_click",function(d){showCategory(d.points[0].label);});
}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");
function clearStatActive(){document.querySelectorAll(".stat-card").forEach(function(e){e.classList.remove("active");});}
function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function annCardHTML(a,showComp){
  var t='<span class="ann-type">'+esc(a.type)+'</span>';
  if(showComp)t+='<span class="ann-comp-tag">'+esc(a.competitor)+'</span>';
  t+='<span class="ann-date-tag">'+fmtDate(a.date)+'</span>';
  return '<div class="ann-card"><div>'+t+'</div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';
}

document.querySelectorAll(".stat-card").forEach(function(el){el.addEventListener("click",function(){var a=this.dataset.action;if(a==="stat-tracked")showStatTracked();else if(a==="stat-ann")showStatAnn();else if(a==="stat-active")showStatActive();else if(a==="stat-cats")showStatCats();});});
panel.addEventListener("click",function(e){
  var c=e.target.closest(".comp-card:not(.inactive)");if(c&&c.dataset.comp){showCompetitor(c.dataset.comp);return;}
  var cc=e.target.closest(".cat-card");if(cc&&cc.dataset.cat){showCategory(cc.dataset.cat);return;}
  var cl2=e.target.closest("[data-showcomp]");if(cl2){showCompetitor(cl2.dataset.showcomp);return;}
  var bc=e.target.closest("[data-nav]");if(bc){if(bc.dataset.nav==="overview")showOverview();else if(bc.dataset.nav==="categories")showStatCats();}
});

function showOverview(){clearStatActive();
  var h='<h2>Daily Briefing <span class="badge">'+ALL_ANN.length+' announcements</span></h2>';
  h+='<div class="section-label">Competitors with News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length>0)h+='<div class="comp-card" data-comp="'+esc(nm)+'"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="count">'+info.announcements.length+'</div></div>';}
  h+='<div class="section-label">No News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length===0)h+='<div class="comp-card inactive"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="no-ann">none</div></div>';}
  panel.innerHTML=h;
}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+names.length+'</span></h2>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],cls=info.announcements.length>0?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(nm)+'"><div><div class="name"><span class="status-dot '+(info.announcements.length>0?"status-active":"status-inactive")+'"></span>'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div>'+(info.announcements.length>0?'<div class="count">'+info.announcements.length+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length>0)sorted.push([names[i],DATA[names[i]]]);}
  sorted.sort(function(a,b){return b[1].announcements.length-a[1].announcements.length;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(sorted[i][1].category)+'</div></div><div class="count">'+sorted[i][1].announcements.length+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length===0)h+='<span class="inactive-chip">'+esc(names[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category;if(!allCats[cat])allCats[cat]={comps:[],ann:0};allCats[cat].comps.push(names[i]);allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888";
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+d.comps.length+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var info=DATA[name];if(!info)return;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(name)+'</span></div>';
  h+='<h2>'+esc(name)+' <span class="badge">'+info.announcements.length+' announcement'+(info.announcements.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(info.category)+'</strong></p>';
  if(info.announcements.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<info.announcements.length;i++){var a=info.announcements[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var comps=[],active=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){comps.push([names[i],DATA[names[i]]]);if(DATA[names[i]].announcements.length>0)active.push([names[i],DATA[names[i]]]);}}
  var total=0;for(var i=0;i<comps.length;i++)total+=comps[i][1].announcements.length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<active.length;i++){var nm=active[i][0],inf=active[i][1];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(nm)+'">'+esc(nm)+' ('+inf.announcements.length+') &#8599;</div>';
    for(var j=0;j<inf.announcements.length;j++){var a=inf.announcements[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inact=comps.filter(function(c){return c[1].announcements.length===0;});
  if(inact.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inact.length;i++)h+='<span class="inactive-chip">'+esc(inact[i][0])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}

showOverview();
})();
</script>
</body>
</html>
