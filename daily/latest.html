*{margin:0;padding:0;box-sizing:border-box}

.pill-ann{background:rgba(118,185,0,.15);color:var(--accent)}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:20px 0 8px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.status-active{background:var(--accent)}.status-inactive{background:#444}

var DATA={"Palo Alto Networks": {"category": "Platforms", "announcements": [{"title": "Palo Alto Networks and AT&T Launch Quantum-Resilient SASE Fabric", "summary": "Palo Alto Networks and AT&T Business unveiled a joint Quantum-Resilient SASE Fabric that integrates Prisma SD-WAN with AT&T's global network to deliver quantum-ready secure connectivity. It embeds native post-quantum cryptography into Prisma SASE with a crypto-agile, software-defined design, dual classical/quantum-resistant identities, and zero-touch provisioning. A Service Provider Interconnect links Palo Alto's security platform to AT&T's Private Network Core to cut latency, targeting NIS2, DORA and CNSA 2.0 compliance without a forklift upgrade.", "type": "Partnership", "date": "2026-07-17", "source_url": "https://www.paloaltonetworks.com/blog/2026/07/palo-alto-networks-and-att-delivering-quantum-resilient-sase-fabric/"}, {"title": "IBM, Red Hat and Palo Alto Networks Expand Project Lightwell", "summary": "Palo Alto Networks joined IBM and Red Hat to expand Project Lightwell, accelerating vulnerability response across open source, commercial apps, OT and connected devices. Palo Alto adds network-level Virtual Patching to complement Lightwell's open-source remediation, enabling same-day virtual patch deployment to shorten the window from discovery to protection. The collaboration includes shared vulnerability intelligence, secure information-sharing, anonymized exploit telemetry, and IBM Security Services advisory support to prioritize and validate protections across complex environments.", "type": "Partnership", "date": "2026-07-17", "source_url": "https://mid-east.info/ibm-red-hat-and-palo-alto-networks-expand-project-lightwell-to-help-organizations-respond-to-software-vulnerabilities/"}]}, "Palo Alto Networks ~AI": {"category": "AI Security", "announcements": [{"title": "Prisma AIRS AI Gateway Reaches General Availability as Enterprise AI Control Plane", "summary": "Palo Alto Networks announced general availability of its Prisma AIRS AI Gateway, now integrating Portkey technology to serve as a unified enterprise AI control plane sitting inline between AI interactions, model providers and agentic apps. It unifies execution across LLM, MCP and A2A gateways with claimed sub-millisecond routing, 99.999% availability and 68 trillion tokens processed monthly. The GA delivers governance, identity and runtime controls at scale, positioning Prisma AIRS as the foundation for secure AI infrastructure against rivals Zscaler and CrowdStrike.", "type": "Product Launch", "date": "2026-07-17", "source_url": "https://vendordeep.com/report/palo-alto-networks-launches-gateway-centralized-control"}]}, "Check Point Software ~AI": {"category": "AI Security", "announcements": [{"title": "Check Point Research Publishes AI Security Report 2026", "summary": "Check Point Research released its AI Security Report 2026, warning that AI has shifted from assisting attackers to autonomously operating live intrusions. It cites a breach in which two AI tools compromised nine Mexican government agencies by executing 5,317 AI-driven commands across 34 sessions, and notes the vulnerability-to-exploit window has shrunk from days to hours. Adverse AI prompts doubled year over year; roughly 87-93% of organizations face at least one high-risk AI interaction monthly. Check Point urges Security for AI, Security by AI, and Security with AI.", "type": "Report", "date": "2026-07-17", "source_url": "https://research.checkpoint.com/2026/ai-security-report-2026/"}]}, "Cloudflare ~AS": {"category": "Application Security", "announcements": [{"title": "Cloudflare Ships Emergency WAF Release Blocking WordPress RCE and SQLi", "summary": "Cloudflare issued an emergency Web Application Firewall release blocking active exploitation of two high-severity WordPress vulnerabilities: an unauthenticated remote code execution via the REST API and a related SQL injection. New managed rules (Unauthenticated RCE and SQLi, set to Block) were deployed at 17:03 UTC to all customers, including free and paid plans. WordPress released fixes in 7.0.2 with backports; Cloudflare stressed WAF coverage is not a substitute for patching and advised reviewing rules and monitoring Security Events.", "type": "Security Update", "date": "2026-07-17", "source_url": "https://developers.cloudflare.com/changelog/post/2026-07-17-emergency-waf-release/"}]}, "Cloudflare ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Cloudflare Advances 'Pay Per Use' Model for AI Answers", "summary": "Cloudflare detailed its Pay Per Use model that compensates publishers when their content surfaces in AI-generated answers rather than per page fetch. Starting September 15, 2026, Cloudflare will block many ad-supported, mixed-use AI crawlers by default unless site owners opt in, pushing AI companies to pay for content used in training and answers. Early partners include Ceramic.ai and You.com. CEO Matthew Prince framed the shift as essential to sustaining publishing economics amid AI-driven discovery and heavily non-human web traffic.", "type": "Product Update", "date": "2026-07-18", "source_url": "https://interviewer99.com/cloudflare-pay-per-use-ai-crawlers-publishers/"}]}, "Akamai ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Akamai Deploys NVIDIA 'AI Grid' Across 4,400 Edge Locations", "summary": "Akamai said it deployed NVIDIA's AI Grid reference design across its 4,400 edge locations, claiming to be first to operationalize the offering at scale. The rollout uses thousands of NVIDIA RTX Pro 6000 Blackwell Server Edition GPUs at edge sites to enable low-latency, cost-efficient real-time AI inference. Highlighted use cases include real-time video, physical AI, agentic and personalized experiences, and access to fine-tuned models. Akamai argues edge inference offers the right balance of latency, cost and scale for long-tail AI workloads versus centralized AI factories.", "type": "Product Launch", "date": "2026-07-17", "source_url": "https://www.datacenterdynamics.com/en/news/akamai-deploys-nvidia-ai-grid-across-4400-edge-locations-claims-to-be-first/"}]}, "AWS ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "SageMaker HyperPod Adds Partition-Level Topology for Slurm Clusters", "summary": "AWS announced that Amazon SageMaker HyperPod now supports partition-level network topology for Slurm-orchestrated clusters, letting a single cluster mix block topology (e.g., EC2 UltraServer ml.p6e-gb200.36xlarge) and tree topology (ml.p5 instances) partitions. HyperPod auto-optimizes topology per partition and adapts during scale operations, with topology-aware scheduling on by default. It requires Slurm 25.11+ and supported GPU instances, and is available in all Regions where HyperPod runs. The feature improves distributed training performance, GPU-to-GPU communication and NCCL efficiency for large AI workloads.", "type": "Product Update", "date": "2026-07-17", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/07/hyperpod-partition-topology-slurm/"}]}, "Fortinet": {"category": "Platforms", "announcements": []}, "Cisco": {"category": "Platforms", "announcements": []}, "CrowdStrike": {"category": "Platforms", "announcements": []}, "Zscaler": {"category": "Platforms", "announcements": []}, "HiddenLayer": {"category": "AI Security", "announcements": []}, "Lasso Security": {"category": "AI Security", "announcements": []}, "Operant AI": {"category": "AI Security", "announcements": []}, "Pillar Security": {"category": "AI Security", "announcements": []}, "Mindgard": {"category": "AI Security", "announcements": []}, "Fastly": {"category": "Application Delivery (ADCs)", "announcements": []}, "Citrix (NetScaler)": {"category": "Application Delivery (ADCs)", "announcements": []}, "A10 Networks": {"category": "Application Delivery (ADCs)", "announcements": []}, "Arista Networks": {"category": "AI Data Delivery", "announcements": []}, "HPE / Juniper Networks": {"category": "AI Data Delivery", "announcements": []}, "Radware": {"category": "Application Security", "announcements": []}, "Barracuda Networks": {"category": "Application Security", "announcements": []}, "Imperva (Thales)": {"category": "Application Security", "announcements": []}};
var catColors={"Platforms":"#636efa","AI Security":"#ef553b","AI Data Delivery":"#00cc96","Application Delivery (ADCs)":"#ab63fa","Application Security":"#ffa15a"};

function baseName(s){return s.replace(/ ~(AI|AID|AD|AS|P)$/,"");}
var ALL_ANN=[],names=Object.keys(DATA),compCounts={},catCounts={};
var baseSet={},baseActive={},baseCatMap={};
for(var i=0;i<names.length;i++){var nm=names[i],bn=baseName(nm),info=DATA[nm],n=info.announcements.length;
  baseSet[bn]=1;
  if(!baseCatMap[bn])baseCatMap[bn]=[];
  if(baseCatMap[bn].indexOf(info.category)<0)baseCatMap[bn].push(info.category);
  if(n>0){compCounts[bn]=(compCounts[bn]||0)+n;baseActive[bn]=1;}

ALL_ANN.sort(function(a,b){if(a.date<b.date)return 1;if(a.date>b.date)return -1;return 0;});

  var rows=["Date,Competitor,Category,Type,Title,Summary,Source URL"];
  for(var i=0;i<ALL_ANN.length;i++){var a=ALL_ANN[i];rows.push([a.date,q(a.competitor),q(a.category),q(a.type),q(a.title),q(a.summary),a.source_url].join(","));}
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});var lnk=document.createElement("a");lnk.href=URL.createObjectURL(blob);lnk.download="f5_daily_2026-07-20.csv";lnk.click();
});
function q(s){return '"'+String(s).replace(/"/g,'""')+'"';}

var pL={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{family:"Segoe UI,system-ui,sans-serif",color:"#e2e4ea",size:12},margin:{t:40,b:10,l:10,r:10},showlegend:true,legend:{font:{size:11},orientation:"v",x:1.02,y:0.5}};

  document.getElementById("chart-competitor").on("plotly_click",function(d){showCompetitor(d.points[0].label);});
}else{document.getElementById("chart-competitor").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No competitor announcements today</div>';}

var catL=[],catV=[],catC=[];var ck=Object.keys(catCounts);
for(var i=0;i<ck.length;i++){if(catCounts[ck[i]]>0){catL.push(ck[i]);catV.push(catCounts[ck[i]]);catC.push(catColors[ck[i]]||"#888");}}
if(catL.length>0){
  Plotly.newPlot("chart-category",[{type:"pie",labels:catL,values:catV,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:catC,line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Category",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-category").on("plotly_click",function(d){showCategory(d.points[0].label);});
}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");

function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+baseNames.length+'</span></h2>';
  for(var i=0;i<baseNames.length;i++){var bn=baseNames[i],act=!!baseActive[bn],cnt=compCounts[bn]||0,cls=act?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(bn)+'"><div><div class="name"><span class="status-dot '+(act?"status-active":"status-inactive")+'"></span>'+esc(bn)+'</div><div class="cat">'+esc(baseCatMap[bn].join(", "))+'</div></div>'+(act?'<div class="count">'+cnt+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<baseNames.length;i++){if(baseActive[baseNames[i]])sorted.push([baseNames[i],compCounts[baseNames[i]]]);}
  sorted.sort(function(a,b){return b[1]-a[1];});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(baseCatMap[sorted[i][0]].join(", "))+'</div></div><div class="count">'+sorted[i][1]+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<baseNames.length;i++){if(!baseActive[baseNames[i]])h+='<span class="inactive-chip">'+esc(baseNames[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category,bn=baseName(names[i]);if(!allCats[cat])allCats[cat]={comps:{},ann:0};if(DATA[names[i]].announcements.length>0)allCats[cat].comps[bn]=1;allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888",ncomp=Object.keys(d.comps).length;
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+ncomp+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var bn=baseName(name);if(baseSet[bn]!==1)return;
  var anns=annsForBase(bn),cats=baseCatMap[bn]||[];
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(bn)+'</span></div>';
  h+='<h2>'+esc(bn)+' <span class="badge">'+anns.length+' announcement'+(anns.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(cats.join(", "))+'</strong></p>';
  if(anns.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<anns.length;i++){var a=anns[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var actMap={},inactMap={};
  for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){var bn=baseName(names[i]);if(DATA[names[i]].announcements.length>0){if(!actMap[bn])actMap[bn]=[];for(var m=0;m<DATA[names[i]].announcements.length;m++)actMap[bn].push(DATA[names[i]].announcements[m]);}else{inactMap[bn]=1;}}}
  var actKeys=Object.keys(actMap);var total=0;for(var i=0;i<actKeys.length;i++)total+=actMap[actKeys[i]].length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<actKeys.length;i++){var bn=actKeys[i],list=actMap[bn];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(bn)+'">'+esc(bn)+' ('+list.length+') &#8599;</div>';
    for(var j=0;j<list.length;j++){var a=list[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inactKeys=Object.keys(inactMap);
  if(inactKeys.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inactKeys.length;i++)h+='<span class="inactive-chip">'+esc(inactKeys[i])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}
showOverview();
})();
</script>
</body>
</html>
