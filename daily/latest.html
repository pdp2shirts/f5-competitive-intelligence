"use strict";
var DATA={"Palo Alto Networks": {"category": "Platforms", "announcements": [{"title": "Palo Alto Warns of Active Exploitation of PAN-OS GlobalProtect VPN Flaw (CVE-2026-0257)", "summary": "Palo Alto Networks confirmed active exploitation of CVE-2026-0257, an authentication-bypass flaw in the PAN-OS GlobalProtect portal and gateway that lets attackers forge override cookies and establish unauthorized VPN sessions. Unit 42 observed two exploitation waves beginning mid-May 2026 with no lateral movement yet, and CISA added the bug to its Known Exploited Vulnerabilities catalog. The company urged customers to patch immediately or apply interim mitigations such as disabling the authentication override feature or using a dedicated certificate for cookie encryption.", "type": "Security Advisory", "date": "2026-06-15", "source_url": "https://thehackernews.com/2026/06/palo-alto-warns-of-active-exploitation.html"}]}, "Fortinet": {"category": "Platforms", "announcements": [{"title": "Fortinet Opens Singapore FortiNDR Cloud Point-of-Presence", "summary": "Fortinet launched a new FortiNDR Cloud Point-of-Presence in Singapore to strengthen regional threat detection and response across ASEAN and Asia-Pacific. The PoP brings FortiNDR Cloud closer to customers, improving visibility across on-premises, cloud, hybrid, and OT environments using AI-powered analytics, behavioral detection, and FortiGuard Labs threat intelligence. Fortinet says it supports faster detection and response, simplified security operations, and helps address regional compliance and performance requirements.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://www.intelligentciso.com/2026/06/15/fortinet-strengthens-regional-threat-detection-and-response-with-singapore-pop/"}]}, "Cisco": {"category": "Platforms", "announcements": [{"title": "Cisco Patches Actively Exploited Catalyst SD-WAN Manager Zero-Day (CVE-2026-20262)", "summary": "Cisco released a fix for CVE-2026-20262, an arbitrary file-write flaw in Catalyst SD-WAN Manager that is under active exploitation. The vulnerability lets an attacker with low-privileged credentials craft requests during file uploads to create or overwrite OS files, potentially escalating to root. Cisco said there are no workarounds and that upgrading is required; CISA added the CVE to its Known Exploited Vulnerabilities catalog with a remediation deadline for federal agencies. It marks the eighth Cisco SD-WAN vulnerability observed in 2026.", "type": "Security Advisory", "date": "2026-06-15", "source_url": "https://www.securityweek.com/cisco-patches-another-sd-wan-zero-day-exploited-in-attacks/"}]}, "Cisco ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Cisco-Foundry Study: AI Drives a Networking 'Supercycle'", "summary": "A new Cisco and Foundry study of 3,400+ IT leaders across 15 countries found AI workloads drove a 34% average increase in campus and branch network traffic over the past year, with nearly 70% reporting more east-west AI traffic. Cisco argues the 'networking supercycle' means security, visibility, and AI performance all hinge on the network. The company projects up to 209% total workplace traffic growth over three years from generative, agentic, and physical AI, urging investment in network visibility and traffic management.", "type": "Research Report", "date": "2026-06-15", "source_url": "https://www.nojitter.com/infrastructure/ai-drives-large-increase-in-network-traffic-cisco-and-foundry-find"}]}, "CrowdStrike ~AI": {"category": "AI Security", "announcements": [{"title": "CrowdStrike Unveils Continuous Identity for AI Agents", "summary": "At Identiverse 2026, CrowdStrike launched Continuous Identity for AI Agents, a Falcon Next-Gen Identity Security capability that replaces static policies and standing privileges with real-time, risk-aware authorization for every agent action. Each agent receives a cryptographically verifiable SPIFFE-based identity, and access is granted only as needed and revoked immediately. The capability integrates with Falcon AI Detection and Response to monitor prompts and intent, revoking access if misuse is detected, and spans humans, non-human actors, and AI agents across on-prem, SaaS, browser, and cloud environments.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://www.crowdstrike.com/en-us/press-releases/crowdstrike-unveils-continuous-identity-for-ai-agents/"}]}, "Zscaler": {"category": "Platforms", "announcements": [{"title": "Gigamon Partners with Zscaler to Deliver Deep Observability to Zero Trust Private Access", "summary": "Gigamon and Zscaler announced an integration combining Zscaler Private Access with Gigamon's Application Metadata Intelligence from the Deep Observability Pipeline. The pairing adds application-level visibility to zero-trust access, letting security teams see what users do after connecting, not just who connected. Gigamon extracts roughly 6,000 traffic attributes and correlates them with Zscaler access records to detect lateral movement, enforce least-privilege, and speed investigations across SIEM and SOC tools. The capability is available in limited access to joint customers.", "type": "Partnership", "date": "2026-06-15", "source_url": "https://www.globenewswire.com/news-release/2026/06/15/3311899/0/en/Gigamon-Partners-with-Zscaler-to-Deliver-Deep-Observability-to-Zero-Trust-Private-Access.html"}, {"title": "Zscaler, Transatel and NTT DoCoMo Launch Cellular SASE for IoT", "summary": "Zscaler partnered with Transatel and NTT DoCoMo to launch a Cellular SASE for IoT service that secures IoT devices without endpoint agents. Built on Transatel's global MVNO connectivity and Zscaler's Zero Trust Exchange, traffic from SIM-connected devices flows to Zscaler for threat prevention, firewall, URL filtering, and secure private access before reaching applications. NTT DoCoMo serves as systems integrator and managed services provider, enabling multicarrier global deployments with centralized SIM management to simplify IoT rollouts and reduce attack surfaces.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://www.sdxcentral.com/news/transatel-ntt-and-zscaler-team-on-cellular-sase-for-iot/"}]}, "Check Point Software": {"category": "Platforms", "announcements": [{"title": "Check Point Expands MSP Platform with AI Security and Unified Bundles", "summary": "Check Point announced a major expansion of its managed security platform for MSPs, adding a multi-tenant management platform, native Workforce AI Security, and unified security bundles. Workforce AI Security helps MSPs discover AI usage, govern employee AI interactions, and protect data across AI apps and agents. New bundles combine email, endpoint, browser, mobile, SASE, security awareness training, and DMARC under a simplified, Microsoft-aligned licensing model to reduce tool complexity. The move addresses gaps between AI security strategy and enforcement identified in Check Point's 2026 Cloud Security Report.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://www.technologyrecord.com/article/check-point-expands-managed-security-platform-with-ai-governance-tools-and-unified-bundles"}, {"title": "Check Point Warns of Actively Exploited VPN Zero-Day (CVE-2026-50751)", "summary": "Check Point disclosed active exploitation of CVE-2026-50751, a critical IKEv1 authentication-bypass flaw in its Remote Access VPN and Mobile Access blades that lets unauthenticated attackers bypass user authentication. The company observed suspicious activity on June 4, with forensic analysis tracing operational use to early May, and linked at least one case to Qilin ransomware. Emergency hotfixes were released, and Check Point urged immediate patching plus mitigations such as restricting authentication to IKEv2 and enforcing machine certificates.", "type": "Security Advisory", "date": "2026-06-15", "source_url": "https://research.checkpoint.com/2026/15th-june-threat-intelligence-report/"}]}, "Cloudflare ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Cloudflare Grows AI Team with Ensemble AI Talent to Scale Inference", "summary": "Cloudflare announced that key Ensemble AI team members are joining to accelerate its AI inference infrastructure and make running large models cheaper, faster, and more globally accessible. The talent bolsters Cloudflare Workers AI, which delivers serverless GPU-powered inference across its global edge. The work builds on prior efficiency efforts like Infire and tensor compression, focusing on model efficiency, GPU utilization, and scalable deployment to reduce cost and operational overhead for AI workloads.", "type": "Company News", "date": "2026-06-15", "source_url": "https://blog.cloudflare.com/ensemble-ai-talent-joins-cloudflare/"}]}, "AWS": {"category": "Platforms", "announcements": [{"title": "Amazon CloudWatch Introduces Unified Log Analytics", "summary": "AWS launched Log Analytics, a unified Amazon CloudWatch console that combines Logs Insights, Live Tail, and Contributor Insights into a single experience. It supports multi-tab queries, saved queries with parameters, facets, natural-language queries, and visualizations, plus real-time log streaming and top-contributor analysis. Log Analytics is now the default experience across all commercial AWS Regions, with pricing aligned to the underlying services, and existing tools remain available for customers who opt out.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/06/amazon-cloudwatch-log-analytics/"}]}, "AWS ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "AWS Adds Google Gemma 4 Models to Amazon Bedrock", "summary": "AWS made Google DeepMind's Gemma 4 family available on Amazon Bedrock under Apache 2.0, including 31B dense, 26B-A4B MoE, and E2B variants. The open-weight models offer built-in reasoning, native function calling, structured output, streaming, and multimodal input on a fully managed service with Bedrock's security and privacy controls. Inference is accessed via an OpenAI-compatible endpoint, launching in US East (N. Virginia, Ohio), US West (Oregon), and Europe (Frankfurt), targeting multimodal agents, document understanding, and software engineering workflows.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://aws.amazon.com/blogs/machine-learning/introducing-gemma-4-models-on-amazon-bedrock/"}]}, "AWS ~AS": {"category": "Application Security", "announcements": [{"title": "AWS WAF Adds AI Traffic Monetization to Charge AI Bots for Content", "summary": "AWS WAF introduced an AI traffic monetization capability that lets content owners charge AI bots for access to protected content. Owners can set per-request pricing by content path, bot category, or verification tier in the WAF console and collect payments from AI agents via third-party integrations, settling in stablecoins to preferred wallets. Applied at CloudFront edge locations with WAF web ACLs, it requires no origin or application changes and builds on WAF Bot Control to address surging, uncompensated AI bot traffic.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://aws.amazon.com/blogs/aws/aws-waf-adds-ai-traffic-monetization-capability-to-help-content-owners-charge-ai-bots-for-content-access/"}]}, "AWS ~AD": {"category": "Application Delivery (ADCs)", "announcements": [{"title": "Amazon ECS Express Mode Comes to AWS GovCloud (US)", "summary": "AWS made Amazon ECS Express Mode available in AWS GovCloud (US-East and US-West) Regions, enabling rapid deployment of containerized web apps and APIs with minimal configuration. Each Express Mode service gets an AWS-provided domain and can serve public or private HTTPS traffic, automatically consolidating up to 25 services behind a single Application Load Balancer with intelligent routing while preserving service isolation. There is no extra charge for Express Mode, and underlying infrastructure remains fully accessible and modifiable.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/06/amazon-ecs-express-mode-govcloud/"}]}, "Akamai ~AI": {"category": "AI Security", "announcements": [{"title": "Akamai Unveils Agentic Security Framework with Visa, Skyfire, and Experian", "summary": "Akamai launched a unified Agentic Security Framework for its Bot & Agent Control solutions, linking identity, observability, trust, and edge security into a real-time decisioning layer for AI-driven interactions and commerce. Partnerships with Visa (Trusted Agent Protocol), Skyfire, and Experian (Know Your Agent) establish verified agent identity, origin, and intent so AI agents can be authenticated and authorized for secure, permissioned transactions. Decisions are enforced at the edge to minimize latency, with analytics separating human, beneficial-AI, and malicious bot traffic.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://stockhouse.com/news/press-releases/2026/06/15/akamai-unveils-agentic-security-framework-to-power-trusted-ai-driven"}]}, "Fastly": {"category": "Application Delivery (ADCs)", "announcements": []}, "Citrix (NetScaler)": {"category": "Application Delivery (ADCs)", "announcements": [{"title": "Citrix Urges Immediate Patching for Critical NetScaler Vulnerabilities (CVE-2026-3055, CVE-2026-4368)", "summary": "Citrix is urging immediate patching of NetScaler ADC and NetScaler Gateway for two flaws under active exploitation. CVE-2026-3055 is a critical out-of-bounds memory read (CVSS up to 9.8) that can leak sensitive data when the appliance is configured as a SAML IDP, while CVE-2026-4368 is a high-severity race condition causing session mix-ups. Fortinet confirmed large-scale exploitation of CVE-2026-3055 against internet-facing appliances. Only customer-managed instances are affected; Citrix released fixed builds and a Global Deny List mitigation.", "type": "Security Advisory", "date": "2026-06-15", "source_url": "https://www.infosecurity-magazine.com/news/citrix-patch-netscaler/"}]}, "A10 Networks ~AI": {"category": "AI Security", "announcements": [{"title": "A10 Networks Acquires AI Security Firm TrojAI", "summary": "A10 Networks announced the acquisition of TrojAI, an AI security company focused on securing, testing, and governing AI applications and agentic workflows. The deal adds two-tier AI security, build-time red teaming and real-time runtime protection, to complement A10's hardware-based AI firewall, helping customers deploy generative and agentic AI with sovereignty over data and models across on-premises, cloud, and hybrid environments. A10 said it does not expect a material impact to fiscal 2026 results and will integrate TrojAI's capabilities into its security portfolio.", "type": "Acquisition", "date": "2026-06-15", "source_url": "https://finance.yahoo.com/sectors/technology/articles/a10-networks-acquires-trojai-inc-131500309.html"}]}, "Arista Networks": {"category": "AI Data Delivery", "announcements": []}, "HPE / Juniper Networks ~P": {"category": "Platforms", "announcements": [{"title": "HPE Unifies Juniper Partner Program into HPE Partner Ready Vantage", "summary": "HPE announced it will unify the HPE and Juniper Networks partner programs under HPE Partner Ready Vantage, effective November 1, 2026, consolidating networking, cloud, AI, storage, financing, and services into one channel experience. Partners get a single set of membership tiers, competencies, compensation, portal, and deal registration, plus expanded channel-only offerings and incentives delivering up to 24% margin on storage opportunities. Select HPE products move to channel-only sales from July 1, and the program emphasizes simplified onboarding and cross-portfolio selling across AI and private cloud.", "type": "Partnership", "date": "2026-06-15", "source_url": "https://www.channele2e.com/news/hpe-unifies-juniper-partner-program-expands-channel-only-cloud-and-ai-offers"}]}, "Radware": {"category": "Application Security", "announcements": [{"title": "Radware Unveils AI Xploit Shield for Rapid Virtual Patching", "summary": "Radware launched AI Xploit Shield, an AI-powered service that rapidly protects web applications and APIs from exploitation of newly discovered vulnerabilities while patches are developed and deployed. The AI-driven virtual patching automatically generates and deploys tailored protections without modifying the underlying software, reducing the exposure window across on-premises, cloud, and hybrid environments. Part of Radware's cloud security platform, it addresses patch delays caused by testing, legacy systems, downtime concerns, and third-party dependencies.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://uk.investing.com/news/stock-market-news/radware-launches-aipowered-vulnerability-protection-service-93CH-4730065"}]}, "Barracuda Networks": {"category": "Application Security", "announcements": [{"title": "Barracuda Wins Five 2026 Comparably Awards for Culture and Career Growth", "summary": "Barracuda Networks announced it earned five 2026 Comparably Awards, recognizing Best Career Growth and top performance across its HR, Engineering, Sales, and Marketing departments. The awards are based on anonymous employee feedback reflecting growth opportunities, collaboration, and day-to-day experience. Barracuda highlighted the recognition as evidence of its commitment to career development and a strong, collaborative culture that benefits both employees and customers.", "type": "Company News", "date": "2026-06-15", "source_url": "https://blog.barracuda.com/2026/06/15/barracuda-comparably-awards-career-growth-standout-teams-2026"}]}, "Imperva (Thales)": {"category": "Application Security", "announcements": [{"title": "Imperva Launches AI Security Assistant for Faster Investigations", "summary": "Imperva introduced an AI Security Assistant integrated into its Thales-powered AppSec platform to speed security investigations, starting with Cloud WAF. Building on AI ExplAIn, which gives plain-language explanations for blocked requests, the assistant now supports cross-product investigations, delivering fast, ranked, security-relevant answers from a customer's own data via natural-language queries. It connects signals across sessions, such as WAF blocks and automated-traffic activity, and is in controlled availability for select customers to refine quality, guardrails, and workflows before wider rollout.", "type": "Product Launch", "date": "2026-06-15", "source_url": "https://www.imperva.com/blog/ai-security-assistant/"}]}, "Lasso Security": {"category": "AI Security", "announcements": [{"title": "Lasso Security Integrates with TrueFoundry AI Gateway", "summary": "Lasso Security announced an integration with the TrueFoundry AI Gateway that adds centralized, enterprise-grade security for all models and applications. Lasso analyzes prompts and responses to prevent prompt injection, jailbreaks, data leakage with PII masking, and toxic content, with OWASP Top 10 for LLMs coverage. The gateway routes requests to Lasso for verdicts, allowing, blocking with a safe fallback, or masking sensitive text, with optional post-output scanning. Setup is a single guardrail configuration in the TrueFoundry dashboard, providing unified policy management and complete audit trails.", "type": "Partnership", "date": "2026-06-15", "source_url": "https://www.truefoundry.com/blog/lasso-security-integration-with-truefoundry-ai-gateway"}]}, "HiddenLayer": {"category": "AI Security", "announcements": []}, "Operant AI": {"category": "AI Security", "announcements": []}, "Pillar Security": {"category": "AI Security", "announcements": []}, "Mindgard": {"category": "AI Security", "announcements": []}};
var catColors={"Platforms":"#636efa","AI Security":"#ef553b","AI Data Delivery":"#00cc96","Application Delivery (ADCs)":"#ab63fa","Application Security":"#ffa15a"};
var cCL=["#76b900","#00b4d8","#ef553b","#ab63fa","#ffa15a","#19d3f3","#ff6692","#636efa","#00cc96","#b6e880","#ff97ff"];
var ALL_ANN=[],names=Object.keys(DATA),compCounts={},catCounts={};
for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],n=info.announcements.length;
  if(n>0)compCounts[nm]=n;
  if(!catCounts[info.category])catCounts[info.category]=0;
  catCounts[info.category]+=n;
  for(var j=0;j<n;j++){var a=info.announcements[j];ALL_ANN.push({title:a.title,summary:a.summary,source_url:a.source_url,type:a.type,date:a.date,competitor:nm,category:info.category});}}

document.getElementById("exportBtn").addEventListener("click",function(){
  var rows=["Date,Competitor,Category,Type,Title,Summary,Source URL"];
  for(var i=0;i<ALL_ANN.length;i++){var a=ALL_ANN[i];rows.push([a.date,q(a.competitor),q(a.category),q(a.type),q(a.title),q(a.summary),a.source_url].join(","));}
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});var lnk=document.createElement("a");lnk.href=URL.createObjectURL(blob);lnk.download="f5_daily_2026-06-15.csv";lnk.click();
});
function q(s){return '"'+String(s).replace(/"/g,'""')+'"';}

var pL={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{family:"Segoe UI,system-ui,sans-serif",color:"#e2e4ea",size:12},margin:{t:40,b:10,l:10,r:10},showlegend:true,legend:{font:{size:11},orientation:"v",x:1.02,y:0.5}};
var cl=Object.keys(compCounts),cv=[];for(var i=0;i<cl.length;i++)cv.push(compCounts[cl[i]]);
if(cl.length>0){
  Plotly.newPlot("chart-competitor",[{type:"pie",labels:cl,values:cv,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:cCL.slice(0,cl.length),line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Competitor",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-competitor").on("plotly_click",function(d){showCompetitor(d.points[0].label);});
}else{document.getElementById("chart-competitor").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No competitor announcements today</div>';}

var catL=[],catV=[],catC=[];var ck=Object.keys(catCounts);
for(var i=0;i<ck.length;i++){if(catCounts[ck[i]]>0){catL.push(ck[i]);catV.push(catCounts[ck[i]]);catC.push(catColors[ck[i]]||"#888");}}
if(catL.length>0){
  Plotly.newPlot("chart-category",[{type:"pie",labels:catL,values:catV,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:catC,line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Category",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-category").on("plotly_click",function(d){showCategory(d.points[0].label);});
}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");
function clearStatActive(){document.querySelectorAll(".stat-card").forEach(function(e){e.classList.remove("active");});}
function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function annCardHTML(a,showComp){
  var t='<span class="ann-type">'+esc(a.type)+'</span>';
  if(showComp)t+='<span class="ann-comp-tag">'+esc(a.competitor)+'</span>';
  t+='<span class="ann-date-tag">'+fmtDate(a.date)+'</span>';
  return '<div class="ann-card"><div>'+t+'</div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';
}

document.querySelectorAll(".stat-card").forEach(function(el){el.addEventListener("click",function(){var a=this.dataset.action;if(a==="stat-tracked")showStatTracked();else if(a==="stat-ann")showStatAnn();else if(a==="stat-active")showStatActive();else if(a==="stat-cats")showStatCats();});});
panel.addEventListener("click",function(e){
  var c=e.target.closest(".comp-card:not(.inactive)");if(c&&c.dataset.comp){showCompetitor(c.dataset.comp);return;}
  var cc=e.target.closest(".cat-card");if(cc&&cc.dataset.cat){showCategory(cc.dataset.cat);return;}
  var cl2=e.target.closest("[data-showcomp]");if(cl2){showCompetitor(cl2.dataset.showcomp);return;}
  var bc=e.target.closest("[data-nav]");if(bc){if(bc.dataset.nav==="overview")showOverview();else if(bc.dataset.nav==="categories")showStatCats();}
});

function showOverview(){clearStatActive();
  var h='<h2>Daily Briefing <span class="badge">'+ALL_ANN.length+' announcements</span></h2>';
  h+='<div class="section-label">Competitors with News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length>0)h+='<div class="comp-card" data-comp="'+esc(nm)+'"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="count">'+info.announcements.length+'</div></div>';}
  h+='<div class="section-label">No News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length===0)h+='<div class="comp-card inactive"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="no-ann">none</div></div>';}
  panel.innerHTML=h;
}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+names.length+'</span></h2>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],cls=info.announcements.length>0?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(nm)+'"><div><div class="name"><span class="status-dot '+(info.announcements.length>0?"status-active":"status-inactive")+'"></span>'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div>'+(info.announcements.length>0?'<div class="count">'+info.announcements.length+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length>0)sorted.push([names[i],DATA[names[i]]]);}
  sorted.sort(function(a,b){return b[1].announcements.length-a[1].announcements.length;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(sorted[i][1].category)+'</div></div><div class="count">'+sorted[i][1].announcements.length+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length===0)h+='<span class="inactive-chip">'+esc(names[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category;if(!allCats[cat])allCats[cat]={comps:[],ann:0};allCats[cat].comps.push(names[i]);allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888";
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+d.comps.length+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var info=DATA[name];if(!info)return;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(name)+'</span></div>';
  h+='<h2>'+esc(name)+' <span class="badge">'+info.announcements.length+' announcement'+(info.announcements.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(info.category)+'</strong></p>';
  if(info.announcements.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<info.announcements.length;i++){var a=info.announcements[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var comps=[],active=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){comps.push([names[i],DATA[names[i]]]);if(DATA[names[i]].announcements.length>0)active.push([names[i],DATA[names[i]]]);}}
  var total=0;for(var i=0;i<comps.length;i++)total+=comps[i][1].announcements.length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<active.length;i++){var nm=active[i][0],inf=active[i][1];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(nm)+'">'+esc(nm)+' ('+inf.announcements.length+') &#8599;</div>';
    for(var j=0;j<inf.announcements.length;j++){var a=inf.announcements[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inact=comps.filter(function(c){return c[1].announcements.length===0;});
  if(inact.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inact.length;i++)h+='<span class="inactive-chip">'+esc(inact[i][0])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}

showOverview();
})();
</script>
</body>
</html>
