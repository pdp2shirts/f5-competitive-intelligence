tacks. Testing 15 closed flagship models from OpenAI, Anthropic, Google, Amazon, and xAI across 30,000 single-turn prompts and 7,000 multi-turn attacks, Cisco found multi-turn attack success rates up to 88% \u2014 far higher than single-turn benchmarks predict. Over half of tested models showed at least a 15-point gap between single-turn and multi-turn results. Cisco recommends adversarial-success-rate reporting, regression checks, and manual review for models with cross-regime gaps.", "type": "Research", "date": "2026-05-28", "source_url": "https://www.helpnetsecurity.com/2026/05/28/cisco-multi-turn-ai-attacks/"}]}, "CrowdStrike ~AI": {"category": "AI Security", "announcements": [{"title": "CrowdStrike Expands Project QuiltWorks with Cyber Insurance Partners for Frontier AI Risk", "summary": "CrowdStrike expanded Project QuiltWorks to include cyber-insurance leaders Coalition, Liberty Mutual, Lockton, Resilience, and Marsh, creating the first fully coordinated framework combining AI-driven vulnerability discovery, remediation, and financial risk mitigation. The expanded program adds actuarial and underwriting insight to enable insurers to underwrite frontier AI risk and provide financial mitigation for organizations. The framework prioritizes remediation beyond traditional CVSS scoring, helping boards understand frontier AI exposure and obtain financial protection alongside technical remediation across the AI threat lifecycle.", "type": "Partnership", "date": "2026-05-28", "source_url": "https://undercodenews.com/crowdstrike-expands-project-quiltworks-to-tackle-the-financial-fallout-of-frontier-ai-cyber-threats/"}]}, "Zscaler ~AI": {"category": "AI Security", "announcements": [{"title": "Zscaler to Acquire Symmetry Systems to Map and Secure AI Agents", "summary": "Zscaler announced plans to acquire Symmetry Systems to enhance enterprise AI security by integrating Symmetry's access graph technology into the Zero Trust Exchange. The combined platform will map relationships among human and non-human identities, applications, and data sources, providing end-to-end visibility of AI agents, applications, and data interactions. This enables dynamic, least-privilege access policies and automated threat containment. CEO Jay Chaudhry emphasized that identity and data become the new security control plane in an era of AI-distributed resources, positioning Zscaler to govern agent-to-application and agent-to-agent communications at scale.", "type": "Acquisition", "date": "2026-05-28", "source_url": "https://cybermagazine.com/news/zscaler-acquires-symmetry-systems-to-map-secure-ai-agents"}]}, "Check Point Software ~AI": {"category": "AI Security", "announcements": [{"title": "Check Point Launches Agentic Exposure Validation to Counter Autonomous AI Exploitation", "summary": "Check Point Software launched Agentic Exposure Validation (AEV) for its Exposure Management platform, an AI-driven vulnerability validation tool that uses AI agents thinking like attackers to identify which exposures are truly exploitable. AEV correlates exposure data with asset context, live exploit research, threat intelligence, and existing protections in a safe proving loop rather than relying on static severity scores. Early customer engagements revealed novel exploits for vulnerabilities with no known prior exploits. AEV is now available within Check Point Exposure Management, advancing Continuous Threat Exposure Management toward evidence-based exposure reduction.", "type": "Product Launch", "date": "2026-05-28", "source_url": "https://ca.marketscreener.com/news/check-point-software-launches-agentic-exposure-validation-to-counter-frontier-ai-models-now-capable-ce7f5ddada8ff32c"}]}, "Cloudflare ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Cloudflare Adds Support for Claude Managed Agents", "summary": "Cloudflare announced support for Anthropic's Claude Managed Agents, enabling developers to run and manage Claude agents within Cloudflare's ers to complete arrival cards in about three minutes. The architecture uses AWS services in the Asia Pacific (Bangkok) Region across three pillars to support faster borders, improved security, and better citizen experience for one of the world's most visited destinations.", "type": "Customer Win", "date": "2026-05-28", "source_url": "https://press.aboutamazon.com/aws/2026/5/digital-identity-co-modernizes-thailand-immigration-bureau-services-with-aws"}, {"title": "AWS Launches Agentic Shopping Assistant for Retailers", "summary": "AWS launched an agentic shopping assistant for retailers, built on AWS Bedrock, AgentCore, and OpenSearch and leveraging Amazon's own shopping technology. Retailers can create branded, conversational shopping assistants using their own catalogs, rules, and brand voice, with data hosted in their AWS accounts. Targeting roughly 60-day time-to-production, the service includes architecture, starter code, and advisory support via the AWS Generative AI Innovation Centre. Early example: Kate Spade (Tapestry) built an AI Gift Concierge focusing on occasion, recipient, and style to drive natural-dialogue product recommendations while retaining control of customer interactions.", "type": "Product Launch", "date": "2026-05-28", "source_url": "https://ecommercenews.asia/story/aws-launches-agentic-shopping-assistant-for-retailers"}]}, "AWS ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Claude Opus 4.8 Now Available on AWS", "summary": "AWS announced that Anthropic's Claude Opus 4.8 \u2014 the latest, most capable general-availability model \u2014 is now available on AWS. Improvements include long autonomous runs, deeper reasoning, and greater reliability for production AI tasks, with notable gains in coding (reading codebases, planning before edits, maintaining session context), agentic tasks (overcoming obstacles, error recovery, knowing when to ask for help), and knowledge work (synthesizing long documents, self-checking, producing structured deliverables). Access is available via Amazon Bedrock with AWS data residency, Guardrails, and Knowledge Bases, plus the native Claude Platform on AWS via Console.", "type": "Product Launch", "date": "2026-05-28", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/05/claude-opus-4.8-aws/"}, {"title": "AWS Announces Resilient Network Graphs for Faster, More Resilient AI Workloads", "summary": "AWS announced Resilient Network Graphs, a quasi-random, flat mesh networking design intended to accelerate information flow across AWS infrastructure. The architecture changes traffic path establishment and connectivity behavior at scale to improve speed and resilience for distributed and cloud workloads, particularly AI training and inference. Benefits highlighted include lower latency, higher operational resilience, and better performance. AWS did not yet publish performance benchmarks or specify which services will adopt the architecture first, but framed the rollout as a foundational evolution of its data-center fabric to keep pace with AI infrastructure demand.", "type": "Product Launch", "date": "2026-05-28", "source_url": "https://alltoc.com/tech/what-did-aws-announce-about-resilient-network-graphs"}]}, "Akamai ~AS": {"category": "Application Security", "announcements": [{"title": "Akamai App & API Protector Hybrid Now Available on AWS Marketplace", "summary": "Akamai announced that App & API Protector Hybrid is now available on AWS Marketplace, extending Akamai's WAF and Layer 7 DDoS protections into cloud environments and workloads that don't route through the edge. The hybrid solution offers multiple deployment modes \u2014 AWS Marketplace AMI in VPC, containerized security with NGINX/Istio/Envoy, and reverse proxy \u2014 to fit varied architectures. It enforces consistent policy across edge and non-edge environments via a single control plane (Akamai Control Center), aligns with AWS EDP for budget simplicity, and adds resilience as an independent defense layer during outages.", "type": "Product Launch", "date": "2026-05-28", "source_url": "https://www.akamai.com/blog/security/protections-without-compromise-akamais-waf-aws-marketplace"}]}, "Akamai ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Akamai Launches AI Brand Presence to Boost Visibility in Agentic Search", "summary": "Akamai launched AI Brand Presence, a new service that optimizes content for AI search and agentic traffic. It automatically translates website content for LLMs and AI agents, monitors AI bot activity, and provides edge security. In testing on Akamai's own site, the feature boosted brand visibility by 364%, with citations up 85% and AI bot traffic growing over 300% year over year. A single dashboard tracks which AI models visit, what content they consume, and resulting engagement, while reducing data loads for AI consumption. Initial availability is a phased North America rollout to select customers.", "type": "Product Launch", "date": "2026-05-28", "source_url": "https://cxotoday.com/ai/akamai-launches-ai-brand-presence-to-boost-visibility-in-agentic-search/"}]}, "Barracuda Networks": {"category": "Application Security", "announcements": [{"title": "Barracuda Flags Stealthy Microsoft 365 Attacks, AI Lures, and Fileless Malware", "summary": "Barracuda Networks released its May 2026 threat report highlighting attackers evading detection through stealthy Microsoft 365 logins, AI-themed lures, and fileless malware. Malicious M365 logins now appear low-risk by using VPNs and rapidly changing IPs from typically benign UK/US regions, up about 25%. A fake Claude AI installer redirected users to a near-duplicate site that triggered multi-stage PowerShell attacks with browser credential theft, C2 communication, and malicious certificates. Memory-resident clipboard execution avoids disk artifacts. Barracuda Managed XDR mitigated incidents with real-time intelligence, automation, and 24/7 SOC oversight.", "type": "Threat Report", "date": "2026-05-28", "source_url": "https://securitybrief.com.au/story/barracuda-flags-stealthy-microsoft-365-attack-shift"}]}, "Operant AI": {"category": "AI Security", "announcements": [{"title": "Operant AI Releases Operant Endpoint Protector for AI Tool and MCP Workflows", "summary": "Operant AI announced the release of Operant Endpoint Protector, extending its AI Defense Platform to the endpoint. The new tool enables enterprise IT and security teams to discover, detect, and defend against threats across all AI tools, coding agents, and Model Context Protocol (MCP) workflows used by employees directly at the endpoint \u2014 where most AI activity occurs today. The release protects AI agents and MCP-connected processes from compromise or misuse, complementing Operant's existing AI Gatekeeper, MCP Gateway, and 3D Runtime Defense Platform offerings as enterprises grapple with sprawling shadow AI usage on user devices.", "type": "Product Launch", "date": "2026-05-28", "source_url": "https://www.helpnetsecurity.com/2026/05/29/new-infosec-products-of-the-month-may-2026/"}]}, "Mindgard": {"category": "AI Security", "announcements": [{"title": "Mindgard Launches GuardBuster to Measure How AI Guardrails Perform in Real-World Environments", "summary": "Mindgard launched GuardBuster, a new offering to independently evaluate AI guardrails and gateways in real-world, adversarial conditions. GuardBuster combines Mindgard's platform, research, and adversarial expertise to test guardrails against dynamic threats \u2014 prompt injection, jailbreaking, context manipulation, multi-turn deception, and adversarial ML evasion \u2014 outside lab benchmarks. The tool provides evidence-based assessment of how defenses perform in production-like environments, addressing gaps where current guardrails often underperform against real-world attackers. Mindgard positions GuardBuster as a way to help organizations measure risk, harden defenses, and move beyond vendor claims toward document.getElementById("exportBtn").addEventListener("click",function(){
  var rows=["Date,Competitor,Category,Type,Title,Summary,Source URL"];
  for(var i=0;i<ALL_ANN.length;i++){var a=ALL_ANN[i];rows.push([a.date,q(a.competitor),q(a.category),q(a.type),q(a.title),q(a.summary),a.source_url].join(","));}
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});var lnk=document.createElement("a");lnk.href=URL.createObjectURL(blob);lnk.download="f5_daily_2026-05-28.csv";lnk.click();
});
function q(s){return '"'+String(s).replace(/"/g,'""')+'"';}

var pL={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{family:"Segoe UI,system-ui,sans-serif",color:"#e2e4ea",size:12},margin:{t:40,b:10,l:10,r:10},showlegend:true,legend:{font:{size:11},orientation:"v",x:1.02,y:0.5}};
var cl=Object.keys(compCounts),cv=[];for(var i=0;i<cl.length;i++)cv.push(compCounts[cl[i]]);
if(cl.length>0){
  Plotly.newPlot("chart-competitor",[{type:"pie",labels:cl,values:cv,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:cCL.slice(0,cl.length),line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Competitor",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-competitor").on("plotly_click",function(d){showCompetitor(d.points[0].label);});
}else{document.getElementById("chart-competitor").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No competitor announcements today</div>';}

var catL=[],catV=[],catC=[];var ck=Object.keys(catCounts);
for(var i=0;i<ck.length;i++){if(catCounts[ck[i]]>0){catL.push(ck[i]);catV.push(catCounts[ck[i]]);catC.push(catColors[ck[i]]||"#888");}}
if(catL.length>0){
  Plotly.newPlot("chart-category",[{type:"pie",labels:catL,values:catV,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:catC,line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Category",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-category").on("plotly_click",function(d){showCategory(d.points[0].label);});
}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");
function clearStatActive(){document.querySelectorAll(".stat-card").forEach(function(e){e.classList.remove("active");});}
function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function annCardHTML(a,showComp){
  var t='<span class="ann-type">'+esc(a.type)+'</span>';
  if(showComp)t+='<span class="ann-comp-tag">'+esc(a.competitor)+'</span>';
  t+='<span class="ann-date-tag">'+fmtDate(a.date)+'</span>';
  return '<div class="ann-card"><div>'+t+'</div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';
}

document.querySelectorAll(".stat-card").forEach(function(el){el.addEventListener("click",function(){var a=this.dataset.action;if(a==="stat-tracked")showStatTracked();else if(a==="stat-ann")showStatAnn();else if(a==="stat-active")showStatActive();else if(a==="stat-cats")showStatCats();});});
panel.addEventListener("click",function(e){
  var c=e.target.closest(".comp-card:not(.inactive)");if(c&&c.dataset.comp){showCompetitor(c.dataset.comp);return;}
  var cc=e.target.closest(".cat-card");if(cc&&cc.dataset.cat){showCategory(cc.dataset.cat);return;}
  var cl2=e.target.closest("[data-showcomp]");if(cl2){showCompetitor(cl2.dataset.showcomp);return;}
  var bc=e.target.closest("[data-nav]");if(bc){if(bc.dataset.nav==="overview")showOverview();else if(bc.dataset.nav==="categories")showStatCats();}
});

function showOverview(){clearStatActive();
  var h='<h2>Daily Briefing <span class="badge">'+ALL_ANN.length+' announcements</span></h2>';
  h+='<div class="section-label">Competitors with News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length>0)h+='<div class="comp-card" data-comp="'+esc(nm)+'"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="count">'+info.announcements.length+'</div></div>';}
  h+='<div class="section-label">No News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length===0)h+='<div class="comp-card inactive"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="no-ann">none</div></div>';}
  panel.innerHTML=h;
}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+names.length+'</span></h2>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],cls=info.announcements.length>0?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(nm)+'"><div><div class="name"><span class="status-dot '+(info.announcements.length>0?"status-active":"status-inactive")+'"></span>'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div>'+(info.announcements.length>0?'<div class="count">'+info.announcements.length+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length>0)sorted.push([names[i],DATA[names[i]]]);}
  sorted.sort(function(a,b){return b[1].announcements.length-a[1].announcements.length;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(sorted[i][1].category)+'</div></div><div class="count">'+sorted[i][1].announcements.length+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length===0)h+='<span class="inactive-chip">'+esc(names[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category;if(!allCats[cat])allCats[cat]={comps:[],ann:0};allCats[cat].comps.push(names[i]);allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888";
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+d.comps.length+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var info=DATA[name];if(!info)return;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(name)+'</span></div>';
  h+='<h2>'+esc(name)+' <span class="badge">'+info.announcements.length+' announcement'+(info.announcements.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(info.category)+'</strong></p>';
  if(info.announcements.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<info.announcements.length;i++){var a=info.announcements[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var comps=[],active=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){comps.push([names[i],DATA[names[i]]]);if(DATA[names[i]].announcements.length>0)active.push([names[i],DATA[names[i]]]);}}
  var total=0;for(var i=0;i<comps.length;i++)total+=comps[i][1].announcements.length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<active.length;i++){var nm=active[i][0],inf=active[i][1];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(nm)+'">'+esc(nm)+' ('+inf.announcements.length+') &#8599;</div>';
    for(var j=0;j<inf.announcements.length;j++){var a=inf.announcements[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inact=comps.filter(function(c){return c[1].announcements.length===0;});
  if(inact.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inact.length;i++)h+='<span class="inactive-chip">'+esc(inact[i][0])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}

showOverview();
})();
</script>
</body>
</html>
