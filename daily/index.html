<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F5 Daily Briefing Archive</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3347;--text:#e2e4ea;--muted:#8b8fa3;--accent:#76b900;--accent2:#00b4d8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:32px 40px}
.header h1{font-size:24px;font-weight:700;margin-bottom:6px}
.header h1 span{color:var(--accent)}
.header p{color:var(--muted);font-size:14px}
.nav{padding:12px 40px;background:var(--surface);border-bottom:1px solid var(--border);font-size:13px}
.nav a{color:var(--accent);text-decoration:none}
.nav a:hover{text-decoration:underline}
.nav .sep{color:var(--border);margin:0 8px}
.content{max-width:800px;margin:0 auto;padding:32px 40px}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:border-color .2s,transform .1s;text-decoration:none;color:var(--text)}
.day-card:hover{border-color:var(--accent);transform:translateX(4px)}
.day-card .date{font-weight:600;font-size:15px}
.day-card .day-meta{font-size:12px;color:var(--muted);margin-top:2px}
.day-card .count{background:var(--accent);color:#000;font-size:12px;font-weight:700;padding:4px 12px;border-radius:12px}
.empty{text-align:center;padding:60px;color:var(--muted)}
</style>
</head>
<body>
<div class="header">
  <h1><span>F5</span> Daily Briefing Archive</h1>
  <p>Past daily competitive intelligence briefings &middot; 90-day retention</p>
</div>
<div class="nav">
  <a href="../index.html">Hub</a><span class="sep">&rsaquo;</span><span>Daily Archive</span>
</div>
<div class="content">
  <a class="day-card" href="2026-03-18.html">
    <div>
      <div class="date">Tuesday, March 18, 2026</div>
      <div class="day-meta">GTC 2026 Day 3 &middot; Cloudflare, CrowdStrike, Check Point, Cisco, HAProxy</div>
    </div>
    <div class="count">5 items</div>
  </a>
</div>
</body>
</html>
