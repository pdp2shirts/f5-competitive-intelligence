(function(){
"use strict";
var DATA={"Palo Alto Networks": {"category": "Platforms", "announcements": [{"title": "Palo Alto Networks and Deutsche Telekom Launch Sovereign Cortex with T Security", "summary": "Palo Alto Networks and Deutsche Telekom unveiled Sovereign Cortex with T Security, a data-sovereign managed cyber defence service for Europe. It pairs Palo Alto's agentic Cortex SecOps platform with Deutsche Telekom's sovereign architecture, hosted on Telekom's Sovereign Google Cloud with encryption keys held solely in German data centers. Telemetry and threat intelligence stay entirely within Europe to meet DORA, NIS-2 and GDPR requirements, targeting healthcare, public sector, financial services and critical infrastructure operators.", "type": "Partnership", "date": "2026-06-17", "source_url": "https://www.europesays.com/germany/38164/"}, {"title": "Critical PAN-OS Flaw (CVE-2026-0300) Actively Exploited, Added to CISA KEV", "summary": "CISA flagged a critical, actively exploited PAN-OS vulnerability (CVE-2026-0300, CVSS 9.3) in the User-ID Authentication Portal on PA-Series and VM-Series firewalls. The flaw lets unauthenticated attackers run remote code with root privileges via crafted traffic, with limited but active campaigns observed against internet-exposed systems. Affected releases span the 10.2, 11.1, 11.2 and 12.1 branches; mitigation requires restricting external portal access while a permanent fix is developed.", "type": "Security Advisory", "date": "2026-06-17", "source_url": "https://securityboulevard.com/2026/06/critical-palo-alto-pan-os-flaw-becomes-latest-target-for-attackers/"}]}, "Fortinet": {"category": "Platforms", "announcements": [{"title": "Fortinet Launches FortiSOC, a Unified Agentic-AI SOC Platform", "summary": "Fortinet announced FortiSOC, a cloud-delivered unified SOC platform combining SIEM, SOAR, threat intelligence, ITDR, UEBA, case management and AI-driven operations in a single SaaS console. It uses agentic AI to autonomously investigate and correlate alerts and to recommend or execute responses under analyst oversight. Built on Fortinet's SecOps stack and FortiGuard intelligence, FortiSOC adds out-of-the-box playbooks, MCP support and FortiAI-Assist, complementing FortiAnalyzer, FortiSIEM and FortiSOAR with one subscription model.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://www.helpnetsecurity.com/2026/06/17/fortinet-fortisoc-unifies-siem-soar-threat-intelligence-and-ai-in-one-platform/"}, {"title": "FortiBleed Leak Exposes Credentials for ~74,000 Fortinet Devices", "summary": "Researchers disclosed FortiBleed, a massive leak exposing plaintext credentials for roughly 74,000 FortiGate firewall URLs across 194 countries and 21,000-plus domains. Hudson Rock and SOCRadar report attackers harvested SSL VPN auth hashes and cracked passwords to enable lateral movement into RADIUS and Active Directory systems, affecting organizations including Oracle, Lenovo and FedEx. Many devices remain online; users are urged to rotate credentials, enable MFA and review gateway logs.", "type": "Security Incident", "date": "2026-06-17", "source_url": "https://arstechnica.com/security/2026/06/massive-breach-spills-credentials-for-thousands-of-sensitive-networks/"}]}, "Cisco": {"category": "Platforms", "announcements": [{"title": "Cisco Unveils Cisco Cloud Control and Autonomous IT Vision at Cisco Live", "summary": "At Cisco Live in Las Vegas, Cisco outlined an agentic-AI roadmap shifting from human-managed systems to autonomous digital workers. Centerpiece is Cisco Cloud Control, a unified platform fusing networking, security, compute and observability into one operating environment, with automation running natively on existing equipment rather than dedicated hardware. Cisco described a phased, region-by-region rollout emphasizing data sovereignty and governance, envisioning continuously operating agents that collaborate across data centers and enterprises.", "type": "Strategy", "date": "2026-06-17", "source_url": "https://cio.economictimes.indiatimes.com/news/artificial-intelligence/cisco-unveils-vision-for-autonomous-it-the-future-of-self-running-systems/131765305"}]}, "Cisco ~AI": {"category": "AI Security", "announcements": [{"title": "Cisco Adds Agent Validation to AI Defense (Explorer Edition)", "summary": "Cisco introduced Agent Validation, a new evaluation capability in Cisco AI Defense available in the free, self-service Explorer Edition. It extends AI Defense's red-teaming suite to agent-based attack surfaces including tool routes, indirect content channels and persistent state across sessions. Cisco framed Agent Validation as the first of a broader portfolio of agent harness testing that will expand as agent patterns, frameworks and attack classes evolve.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://blogs.cisco.com/ai/agent-validation-explorer-edition"}]}, "Cisco ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Equinix and Cisco Build Secure, Sovereign AI Access in Singapore", "summary": "Equinix and Cisco expanded their collaboration to deploy a Secure AI Factory with NVIDIA inside Equinix Singapore data centers. The full-stack, validated architecture aims to simplify and secure AI deployments and extend AI compute to edge environments such as retail, hospitals and warehouses via Cisco Unified Edge. The companies positioned it as a scalable foundation for moving AI projects from centralized data centers to distributed edge, aligned with Singapore's national AI mission.", "type": "Partnership", "date": "2026-06-17", "source_url": "https://newsroom.equinix.com/2026-06-17-Equinix-and-Cisco-Build-the-Infrastructure-for-Secure,-Sovereign-AI-Access-in-Singapore"}, {"title": "Cisco: Enterprises Have ~36 Months to Modernize Networks for AI", "summary": "Cisco published research warning that AI workloads will roughly triple enterprise network traffic within three years, reshaping east-west and continuous automated AI traffic patterns. Most enterprises expect to hit campus and branch capacity within 24 months, with Wi-Fi a major bottleneck and only a minority confident their networks are AI-ready. Cisco urged treating network modernization as a prerequisite to AI strategy, citing expanding security surfaces and widespread agentic-AI growth ahead.", "type": "Research", "date": "2026-06-17", "source_url": "https://www.techticker.net/2026/06/17/cisco-36-months-to-modernise-networks-before-ai-overwhelms-capacity/"}]}, "CrowdStrike": {"category": "Platforms", "announcements": [{"title": "CrowdStrike Advances AI and Cloud Security Operations on AWS", "summary": "CrowdStrike and AWS unveiled new AI, cloud and SIEM innovations to secure AI applications built on AWS, expanding Falcon AI Detection and Response to protect workloads using Amazon Bedrock, Kiro and Strands Agents. The Falcon platform broadened on AWS Marketplace with 30-day free trials for Next-Gen SIEM, Cloud Security and Endpoint Security on a pay-as-you-go basis. New Quick Start connectors for CloudWatch and S3 logs plus AWS PrivateLink cross-region support accelerate secure onboarding.", "type": "Product Update", "date": "2026-06-17", "source_url": "https://www.crowdstrike.com/en-us/press-releases/crowdstrike-advances-ai-and-cloud-security-operations-on-aws/"}, {"title": "CrowdStrike Expands Project QuiltWorks with AWS", "summary": "CrowdStrike expanded Project QuiltWorks with AWS to harden the cloud attack surface against frontier AI risk, extending the coalition to AWS-backed cloud workloads. The integrated framework combines CrowdStrike's AI-driven vulnerability discovery and prioritization with remediation services and cyber-insurance protection across cloud infrastructure. AWS joins to provide continuous visibility and risk assessment for production workloads, with organizations able to request a QuiltWorks assessment as frontier AI accelerates vulnerability discovery.", "type": "Partnership", "date": "2026-06-17", "source_url": "https://www.crowdstrike.com/en-us/press-releases/crowdstrike-expands-project-quiltworks-with-aws-hardening-the-cloud-attack-surface-against-frontier-ai-risk/"}]}, "CrowdStrike ~AI": {"category": "AI Security", "announcements": [{"title": "CrowdStrike Launches Continuous Identity for AI Agents", "summary": "CrowdStrike introduced Continuous Identity for AI Agents within Falcon Next-Gen Identity Security, delivering real-time, risk-aware authorization for autonomous agents interacting with tools, data, APIs and systems. It uses SPIFFE-based verifiable workload identities to replace static credentials, makes context-aware access decisions from Falcon risk signals, and continuously grants, denies or revokes access to eliminate standing privileges. Integration with Falcon AI Detection and Response revokes access when suspicious agent activity is detected across human, non-human and AI identities.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://pulse2.com/crowdstrike-launches-continuous-identity-for-ai-agents/amp/"}]}, "Zscaler": {"category": "Platforms", "announcements": [{"title": "Zscaler Lays Out AI-Era Security Vision at Zenith Live", "summary": "At Zenith Live, Zscaler unveiled a broad shift from network security to security operations for AI. Announcements included AI Access Graph for visibility into how identities, apps, agents and data connect to AI services; AI Broker to secure agentic traffic via an Agent Registry; Endpoint AI Security to control AI on employee devices; a planned dedicated Enterprise Browser; and the ZAgent Framework enabling autonomous, natural-language-driven SASE operations across ZIA, ZPA and data security modules.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://www.techtarget.com/searchsecurity/opinion/Zscaler-lays-out-its-vision-to-secure-the-AI-era-at-Zenith-Live"}]}, "Zscaler ~AI": {"category": "AI Security", "announcements": [{"title": "Zscaler AI Threat Report: Sensitive Data Uploads to AI Tools Nearly Double", "summary": "Zscaler's AI Threat Report warned that sensitive enterprise data uploaded by employees to AI and ML tools nearly doubled over the past year, with a 93% year-over-year increase in enterprise data transfers to AI services. The report cited elevated breach and espionage risk as generative-AI adoption outpaces governance. Zscaler used the findings to underscore the need for AI visibility, data-loss controls and zero-trust enforcement across employee interactions with AI applications.", "type": "Research", "date": "2026-06-17", "source_url": "https://www.infosecurity-magazine.com/news/sensitive-ai-data-upload-doubles/"}]}, "Check Point Software": {"category": "Platforms", "announcements": [{"title": "Check Point and Illumio Deepen Alliance Against AI-Powered Attacks", "summary": "Check Point and Illumio expanded their partnership to counter AI-powered cyberattacks by combining Check Point's perimeter and threat prevention with Illumio's internal microsegmentation and breach containment. The integration links Check Point firewall policy directly with Illumio's workload model across hybrid and multi-cloud environments, improving visibility and hindering lateral movement, while Illumio Insights adds workload context to flag suspicious activity. Joint customers can procure Illumio through Check Point, and the capabilities are available immediately.", "type": "Partnership", "date": "2026-06-17", "source_url": "https://www.itsecurityguru.org/2026/06/17/check-point-and-illumio-deepen-alliance-to-counter-ai-powered-cyberattacks/"}, {"title": "Check Point Expands MSP Platform with AI Security and Centralized Management", "summary": "Check Point expanded its MSP platform with AI security enhancements, a centralized multi-tenant management system and unified security bundles. New tools monitor AI usage, govern employee interactions with AI tools, and protect data across AI applications and agents. The multi-tenant platform adds tighter PSA integrations, while bundles combine email, endpoint, browser, mobile, SASE, AI security, awareness training and DMARC under a simplified licensing model to streamline procurement for managed service providers.", "type": "Product Update", "date": "2026-06-17", "source_url": "https://ciso.economictimes.indiatimes.com/news/ot-security/check-point-expands-msp-platform-with-ai-security-and-centralized-management-capabilities/131760922"}]}, "Check Point Software ~AI": {"category": "AI Security", "announcements": [{"title": "Check Point Announces Integration with Amazon Bedrock AgentCore", "summary": "Check Point announced an upcoming integration with Amazon Bedrock AgentCore that embeds its AI behavioral monitoring and security controls into agentic workflows. The integration brings AI-native guardrails, prompt-injection detection, sensitive-data and DLP indicators, content inspection and behavioral threat detection, feeding signals into AgentCore policy for deterministic enforcement at the gateway, outside the agent's reasoning loop. Check Point positioned it as helping enterprises move from defining permissions to ensuring agents act correctly with enforceable allow/deny decisions.", "type": "Partnership", "date": "2026-06-17", "source_url": "https://www.prnewswire.com/news-releases/check-point-announces-upcoming-integration-with-amazon-bedrock-agentcore-302803488.html"}]}, "Cloudflare": {"category": "Platforms", "announcements": [{"title": "Cloudflare Launches Cloudflare One Design Partner Designation", "summary": "Cloudflare launched the Cloudflare One Design Partner Designation to accelerate secure AI and seamless SASE adoption. The program designates select global partners, including Arctiq, Consortium, CMT, Presidio and The Missing Link, equipping them with deep technical expertise and funding to speed Cloudflare One deployments. Cloudflare framed the initiative as turning complex network migrations into high-margin consulting opportunities in the AI era.", "type": "Partnership", "date": "2026-06-17", "source_url": "https://www.cloudflare.com/press/press-releases/2026/cloudflare-launches-design-partner-designation-to-accelerate-secure-ai-and-seamless-sase-adoption/"}, {"title": "Cloudflare Introduces the Cloudflare One Stack for Agent-Powered Deployment", "summary": "Cloudflare introduced the Cloudflare One stack, a set of agent-powered skills to configure, deploy and manage Cloudflare One Zero Trust environments. It ships two lightweight skill files, cloudflare-one and cloudflare-one-migration, covering deployment, troubleshooting and migration from other SASE vendors, plus network-diagram generation and Digital Experience Monitoring recommendations. The skills load automatically into agents when context matches and work best paired with Cloudflare's code mode MCP server for secure API access.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://blog.cloudflare.com/cloudflare-one-stack/"}]}, "Cloudflare ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "Cloudflare Brings More Agent Harnesses and Frameworks to Its Platform with Flue", "summary": "Cloudflare expanded support for agent harnesses and frameworks via its Agents SDK, debuting Flue, an open-source framework from the Astro team as the first built on the SDK. Flue agents run in dedicated Durable Objects for automatic scaling, isolated storage and compute, with durable execution and sandboxed code execution against a durable workspace. Cloudflare positioned the Agents SDK as a bottom layer giving any harness durable-execution primitives, with deployment to Cloudflare in a few clicks.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://blog.cloudflare.com/agents-platform-flue-sdk/"}]}, "AWS": {"category": "Platforms", "announcements": [{"title": "AWS Summit New York 2026: Broad AI Agent and Security Announcements", "summary": "At the AWS Summit in New York, AWS unveiled a wide portfolio of AI agent innovations and enterprise tooling. Highlights included Bedrock AgentCore reaching general availability for production agents, the new AWS Context knowledge-graph service, Amazon S3 annotations, the AWS DevOps Agent with release management, AWS Transform for autonomous tech-debt reduction, and Kiro for iOS in preview. AWS also announced Southwest Airlines as a strategic cloud win migrating to an AI- and agent-enabled architecture by 2028.", "type": "Event", "date": "2026-06-17", "source_url": "https://aws.amazon.com/blogs/aws/top-announcements-of-the-aws-summit-in-new-york-2026/"}, {"title": "AWS Introduces Continuum for Security at Machine Speed", "summary": "AWS announced AWS Continuum, a security platform that automates the entire vulnerability lifecycle at machine speed. It ingests findings from existing tools, prioritizes them via a context graph, validates exploitability in an isolated sandbox, applies fast reversible mitigations within guardrails, and integrates durable fixes into review and deployment workflows with blast-radius visibility and rollback. New preview components include Continuum for code vulnerabilities, penetration testing, code scanning and STRIDE threat modeling, working alongside GuardDuty and Security Hub.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://aws.amazon.com/about-aws/whats-new/2026/06/aws-continuum/"}]}, "AWS ~AID": {"category": "AI Data Delivery", "announcements": [{"title": "AWS Announces Context Intelligence for Data and AI Agents at Scale", "summary": "AWS introduced AWS Context, a new service that automatically maps relationships across data into a knowledge graph and provides agentic search so AI agents can access governed data relationships, business rules and domain knowledge at runtime. Complementary updates include previews of Business Context and Semantic Search for the AWS Glue Data Catalog and general availability of Amazon S3 annotations, which attach queryable business context up to 1GB per object. AWS framed context as the data-lake foundation for AI agents.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://aws.amazon.com/blogs/machine-learning/context-intelligence-for-your-data-and-ai-agents-at-scale/"}, {"title": "AWS Launches Web Search on Amazon Bedrock AgentCore", "summary": "AWS announced general availability of Web Search on Amazon Bedrock AgentCore, a fully managed tool that lets AI agents ground responses in current, cited web knowledge without data leaving the customer's secured AWS environment. It is generally available in the US East (N. Virginia) region, with charges applying to data accessed via the Gateway and promotional free credits for AWS customers. The capability helps agents fetch and cite up-to-date web information at runtime.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://aws.amazon.com/blogs/aws/announcing-web-search-on-amazon-bedrock-agentcore-ground-your-ai-agents-in-current-accurate-web-knowledge/"}]}, "AWS ~AS": {"category": "Application Security", "announcements": [{"title": "AWS WAF Adds Bot Control for AI-Driven Content Monetization", "summary": "AWS WAF added Bot Control capabilities that let publishers price, meter and collect payments from AI bots at the edge, enabling AI-driven content monetization. Announced at the AWS Summit New York, the feature gives sites granular control over automated AI traffic, allowing them to monetize crawler and agent access rather than simply blocking it. The capability extends AWS WAF's bot management into the emerging agentic-commerce and AI-traffic landscape.", "type": "Product Update", "date": "2026-06-17", "source_url": "https://aws.amazon.com/blogs/aws/top-announcements-of-the-aws-summit-in-new-york-2026/"}]}, "Akamai ~AS": {"category": "Application Security", "announcements": [{"title": "Akamai Announces Agentic Security Framework for Bot & Agent Control", "summary": "Akamai unveiled the Agentic Security Framework, a unified framework for its Bot & Agent Control solutions that ties identity, observability, trust and edge security into a real-time decisioning layer for AI-driven interactions and commerce. It adds verified agent identity and attribution through a Know Your Agent framework with Visa, Skyfire and Experian, user-centric authentication via Auth0 and Ping Identity, adaptive trust analysis, and edge-based enforcement. Akamai positioned it as admitting AI agents at scale rather than simply detecting bots.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://www.varindia.com/news/akamai-announces-agentic-security-framework-to-power-trusted-ai-driven-interactions-and-commerce"}]}, "HPE / Juniper Networks": {"category": "AI Data Delivery", "announcements": [{"title": "HPE Puts Juniper-Powered AI Networking at the Center of Discover 2026", "summary": "Following its $14B Juniper acquisition, HPE made AI networking the centerpiece of Discover 2026, uniting Juniper's Mist AI with Aruba Central for a self-driving network from cloud to edge. New QFX switches, including the QFX5140 for AI inference and the QFX5252 tray for AMD Helios rack-scale systems, extend HPE's AI Data Center architecture managed via Networking Data Center Director. HPE also expanded Marvis-driven automation, a new SASE Orchestrator, and agentic governance features within Private Cloud AI with NVIDIA.", "type": "Event", "date": "2026-06-17", "source_url": "https://www.nextplatform.com/connect/2026/06/17/hpes-datacenter-networking-picture-comes-into-clearer-focus/5258015"}]}, "Radware": {"category": "Application Security", "announcements": [{"title": "Radware Launches AI Xploit Shield for Automated Virtual Patching", "summary": "Radware launched AI Xploit Shield, a service that automatically generates, tests and deploys customer-specific virtual patches to protect web applications and APIs from newly disclosed vulnerabilities. Using AI rather than generic signatures or manual rules, it bridges the remediation gap before official patches are tested and deployed across cloud, hybrid and on-premises environments without altering the underlying applications. The service expands Radware's AI-powered cloud security platform to reduce the exposure window between vulnerability disclosure and exploitation.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://www.thefastmode.com/technology-solutions/49093-radware-launches-ai-xploit-shield-to-protect-applications-apis-from-emerging-vulnerability-exploits"}]}, "Citrix (NetScaler)": {"category": "Application Delivery (ADCs)", "announcements": [{"title": "NetScaler Vulnerabilities CVE-2026-3055 and CVE-2026-4368 Under Active Exploitation", "summary": "Security researchers warned that Citrix NetScaler ADC and Gateway vulnerabilities CVE-2026-3055 (a memory overread leaking session tokens when configured as a SAML IdP) and CVE-2026-4368 (a race condition enabling session hijack) are being actively probed in the wild. Both carry critical severity, drawing comparisons to prior Citrix Bleed flaws. Citrix urged urgent upgrades to patched 13.1 and 14.1 builds, with a Global Deny List offered as rapid mitigation while organizations plan full firmware upgrades.", "type": "Security Advisory", "date": "2026-06-17", "source_url": "https://www.loadbalancer.dk/blog/the-citrix-netscaler-vulnerability-crisis/"}]}, "A10 Networks ~AI": {"category": "AI Security", "announcements": [{"title": "A10 Networks Acquires TrojAI to Advance Enterprise AI Security", "summary": "A10 Networks announced the acquisition of TrojAI, an AI security company, to accelerate its enterprise AI security roadmap. The deal adds TrojAI's build-time red-teaming, runtime AI firewall enforcement, agentic protocol support and browser-based endpoint protection, enabling production-grade AI security across on-premises, cloud and hybrid deployments. Near real-time feedback from TrojAI's red-teaming updates A10's guardrail models, strengthening protection across ADC, DDoS, application, API and AI security for large enterprises. Management expects no material impact to fiscal 2026 results.", "type": "Acquisition", "date": "2026-06-17", "source_url": "https://www.a10networks.com/blog/a10-acquires-trojai-ai-security/"}]}, "Barracuda Networks": {"category": "Application Security", "announcements": [{"title": "Barracuda Unveils Integrated Email Protection for the Agentic AI Era", "summary": "Barracuda launched Barracuda Integrated Email Protection, an Integrated Cloud Email Security solution on the BarracudaONE platform delivering continuous, autonomous protection across the full email attack lifecycle. It uses AI to detect and reassess evolving threats, enables rapid post-delivery message clawback, and correlates cross-domain signals from email, identity, network, data and applications for Microsoft 365 and Google Workspace. The Bailey AI assistant explains verdicts in plain language, and the API-based architecture deploys in minutes without MX record changes.", "type": "Product Launch", "date": "2026-06-17", "source_url": "https://www.msspalert.com/news/ai-email-attacks-are-moving-fast-barracuda-wants-msps-moving-faster"}]}, "Arista Networks": {"category": "AI Data Delivery", "announcements": []}, "Fastly": {"category": "Application Delivery (ADCs)", "announcements": []}, "Imperva (Thales)": {"category": "Application Security", "announcements": []}, "HiddenLayer": {"category": "AI Security", "announcements": []}, "Lasso Security": {"category": "AI Security", "announcements": []}, "Operant AI": {"category": "AI Security", "announcements": []}, "Pillar Security": {"category": "AI Security", "announcements": []}, "Mindgard": {"category": "AI Security", "announcements": []}};
var catColors={"Platforms":"#636efa","AI Security":"#ef553b","AI Data Delivery":"#00cc96","Application Delivery (ADCs)":"#ab63fa","Application Security":"#ffa15a"};
var cCL=["#76b900","#00b4d8","#ef553b","#ab63fa","#ffa15a","#19d3f3","#ff6692","#636efa","#00cc96","#b6e880","#ff97ff"];
var ALL_ANN=[],names=Object.keys(DATA),compCounts={},catCounts={};
for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],n=info.announcements.length;
  if(n>0)compCounts[nm]=n;
  if(!catCounts[info.category])catCounts[info.category]=0;
  catCounts[info.category]+=n;
  for(var j=0;j<n;j++){var a=info.announcements[j];ALL_ANN.push({title:a.title,summary:a.summary,source_url:a.source_url,type:a.type,date:a.date,competitor:nm,category:info.category});}}

document.getElementById("exportBtn").addEventListener("click",function(){
  var rows=["Date,Competitor,Category,Type,Title,Summary,Source URL"];
  for(var i=0;i<ALL_ANN.length;i++){var a=ALL_ANN[i];rows.push([a.date,q(a.competitor),q(a.category),q(a.type),q(a.title),q(a.summary),a.source_url].join(","));}
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});var lnk=document.createElement("a");lnk.href=URL.createObjectURL(blob);lnk.download="f5_daily_2026-06-17.csv";lnk.click();
});
function q(s){return '"'+String(s).replace(/"/g,'""')+'"';}

var pL={paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{family:"Segoe UI,system-ui,sans-serif",color:"#e2e4ea",size:12},margin:{t:40,b:10,l:10,r:10},showlegend:true,legend:{font:{size:11},orientation:"v",x:1.02,y:0.5}};
var cl=Object.keys(compCounts),cv=[];for(var i=0;i<cl.length;i++)cv.push(compCounts[cl[i]]);
if(cl.length>0){
  Plotly.newPlot("chart-competitor",[{type:"pie",labels:cl,values:cv,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:cCL.slice(0,cl.length),line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Competitor",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-competitor").on("plotly_click",function(d){showCompetitor(d.points[0].label);});
}else{document.getElementById("chart-competitor").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No competitor announcements today</div>';}

var catL=[],catV=[],catC=[];var ck=Object.keys(catCounts);
for(var i=0;i<ck.length;i++){if(catCounts[ck[i]]>0){catL.push(ck[i]);catV.push(catCounts[ck[i]]);catC.push(catColors[ck[i]]||"#888");}}
if(catL.length>0){
  Plotly.newPlot("chart-category",[{type:"pie",labels:catL,values:catV,textinfo:"label+value",textposition:"inside",hoverinfo:"label+value+percent",marker:{colors:catC,line:{color:"#0f1117",width:2}},hole:.35,sort:false}],Object.assign({},pL,{title:{text:"Announcements by Category",font:{size:15,color:"#e2e4ea"},x:.01}}),{responsive:true,displayModeBar:false});
  document.getElementById("chart-category").on("plotly_click",function(d){showCategory(d.points[0].label);});
}else{document.getElementById("chart-category").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b8fa3">No category data today</div>';}

var panel=document.getElementById("detail-panel");
function clearStatActive(){document.querySelectorAll(".stat-card").forEach(function(e){e.classList.remove("active");});}
function fmtDate(d){var dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function annCardHTML(a,showComp){
  var t='<span class="ann-type">'+esc(a.type)+'</span>';
  if(showComp)t+='<span class="ann-comp-tag">'+esc(a.competitor)+'</span>';
  t+='<span class="ann-date-tag">'+fmtDate(a.date)+'</span>';
  return '<div class="ann-card"><div>'+t+'</div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';
}

document.querySelectorAll(".stat-card").forEach(function(el){el.addEventListener("click",function(){var a=this.dataset.action;if(a==="stat-tracked")showStatTracked();else if(a==="stat-ann")showStatAnn();else if(a==="stat-active")showStatActive();else if(a==="stat-cats")showStatCats();});});
panel.addEventListener("click",function(e){
  var c=e.target.closest(".comp-card:not(.inactive)");if(c&&c.dataset.comp){showCompetitor(c.dataset.comp);return;}
  var cc=e.target.closest(".cat-card");if(cc&&cc.dataset.cat){showCategory(cc.dataset.cat);return;}
  var cl2=e.target.closest("[data-showcomp]");if(cl2){showCompetitor(cl2.dataset.showcomp);return;}
  var bc=e.target.closest("[data-nav]");if(bc){if(bc.dataset.nav==="overview")showOverview();else if(bc.dataset.nav==="categories")showStatCats();}
});

function showOverview(){clearStatActive();
  var h='<h2>Daily Briefing <span class="badge">'+ALL_ANN.length+' announcements</span></h2>';
  h+='<div class="section-label">Competitors with News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length>0)h+='<div class="comp-card" data-comp="'+esc(nm)+'"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="count">'+info.announcements.length+'</div></div>';}
  h+='<div class="section-label">No News Today</div>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm];if(info.announcements.length===0)h+='<div class="comp-card inactive"><div><div class="name">'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div><div class="no-ann">none</div></div>';}
  panel.innerHTML=h;
}

function showStatTracked(){clearStatActive();document.querySelector("[data-action=stat-tracked]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Competitors</span></div><h2>Competitors Tracked <span class="badge">'+names.length+'</span></h2>';
  for(var i=0;i<names.length;i++){var nm=names[i],info=DATA[nm],cls=info.announcements.length>0?"comp-card":"comp-card inactive";
    h+='<div class="'+cls+'" data-comp="'+esc(nm)+'"><div><div class="name"><span class="status-dot '+(info.announcements.length>0?"status-active":"status-inactive")+'"></span>'+esc(nm)+'</div><div class="cat">'+esc(info.category)+'</div></div>'+(info.announcements.length>0?'<div class="count">'+info.announcements.length+'</div>':'<div class="no-ann">0</div>')+'</div>';}
  panel.innerHTML=h;
}

function showStatAnn(){clearStatActive();document.querySelector("[data-action=stat-ann]").classList.add("active");
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>All Announcements</span></div><h2>All Announcements <span class="badge">'+ALL_ANN.length+'</span></h2>';
  for(var i=0;i<ALL_ANN.length;i++)h+=annCardHTML(ALL_ANN[i],true);
  if(ALL_ANN.length===0)h+='<div class="empty-state"><div class="icon">&#128240;</div><p>No competitor announcements found today.</p></div>';
  panel.innerHTML=h;
}

function showStatActive(){clearStatActive();document.querySelector("[data-action=stat-active]").classList.add("active");
  var sorted=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length>0)sorted.push([names[i],DATA[names[i]]]);}
  sorted.sort(function(a,b){return b[1].announcements.length-a[1].announcements.length;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Active Today</span></div><h2>Active Today <span class="badge">'+sorted.length+'</span></h2>';
  for(var i=0;i<sorted.length;i++)h+='<div class="comp-card" data-comp="'+esc(sorted[i][0])+'"><div><div class="name"><span class="status-dot status-active"></span>'+esc(sorted[i][0])+'</div><div class="cat">'+esc(sorted[i][1].category)+'</div></div><div class="count">'+sorted[i][1].announcements.length+'</div></div>';
  h+='<div class="section-label" style="margin-top:24px">No News Today</div><div class="inactive-chips">';
  for(var i=0;i<names.length;i++){if(DATA[names[i]].announcements.length===0)h+='<span class="inactive-chip">'+esc(names[i])+'</span>';}
  h+='</div>';panel.innerHTML=h;
}

function showStatCats(){clearStatActive();document.querySelector("[data-action=stat-cats]").classList.add("active");
  var allCats={};for(var i=0;i<names.length;i++){var cat=DATA[names[i]].category;if(!allCats[cat])allCats[cat]={comps:[],ann:0};allCats[cat].comps.push(names[i]);allCats[cat].ann+=DATA[names[i]].announcements.length;}
  var co=Object.keys(allCats).sort(function(a,b){return allCats[b].ann-allCats[a].ann;});
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>Categories</span></div><h2>Categories <span class="badge">'+co.length+'</span></h2>';
  for(var ci=0;ci<co.length;ci++){var cat=co[ci],d=allCats[cat],color=catColors[cat]||"#888";
    h+='<div class="cat-card" data-cat="'+esc(cat)+'"><div><div class="cat-name"><span class="cat-dot" style="background:'+color+'"></span>'+esc(cat)+'</div><div class="cat-meta">'+d.comps.length+' competitors &middot; '+d.ann+' announcements</div></div><div><span class="pill pill-ann">'+d.ann+'</span></div></div>';}
  panel.innerHTML=h;
}

function showCompetitor(name){clearStatActive();var info=DATA[name];if(!info)return;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><span>'+esc(name)+'</span></div>';
  h+='<h2>'+esc(name)+' <span class="badge">'+info.announcements.length+' announcement'+(info.announcements.length!==1?"s":"")+'</span></h2>';
  h+='<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Category: <strong style="color:var(--text)">'+esc(info.category)+'</strong></p>';
  if(info.announcements.length===0){h+='<div class="empty-state"><div class="icon">&#128236;</div><p>No announcements from this competitor today.</p></div>';}
  else{for(var i=0;i<info.announcements.length;i++){var a=info.announcements[i];
    h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  panel.innerHTML=h;
}

function showCategory(category){clearStatActive();
  var comps=[],active=[];for(var i=0;i<names.length;i++){if(DATA[names[i]].category===category){comps.push([names[i],DATA[names[i]]]);if(DATA[names[i]].announcements.length>0)active.push([names[i],DATA[names[i]]]);}}
  var total=0;for(var i=0;i<comps.length;i++)total+=comps[i][1].announcements.length;
  var h='<div class="breadcrumb"><a data-nav="overview">Overview</a><span class="sep">&rsaquo;</span><a data-nav="categories">Categories</a><span class="sep">&rsaquo;</span><span>'+esc(category)+'</span></div>';
  h+='<h2>'+esc(category)+' <span class="badge">'+total+' announcement'+(total!==1?"s":"")+'</span></h2>';
  for(var i=0;i<active.length;i++){var nm=active[i][0],inf=active[i][1];
    h+='<div class="section-label" style="margin-top:24px;cursor:pointer;color:var(--accent)" data-showcomp="'+esc(nm)+'">'+esc(nm)+' ('+inf.announcements.length+') &#8599;</div>';
    for(var j=0;j<inf.announcements.length;j++){var a=inf.announcements[j];
      h+='<div class="ann-card"><div><span class="ann-type">'+esc(a.type)+'</span><span class="ann-date-tag">'+fmtDate(a.date)+'</span></div><div class="ann-title">'+esc(a.title)+'</div><div class="ann-summary">'+esc(a.summary)+'</div><a class="source-link" href="'+a.source_url+'" target="_blank" rel="noopener">&#8599; View Full Source</a></div>';}}
  var inact=comps.filter(function(c){return c[1].announcements.length===0;});
  if(inact.length>0){h+='<div class="section-label" style="margin-top:20px">No News Today</div><div class="inactive-chips">';for(var i=0;i<inact.length;i++)h+='<span class="inactive-chip">'+esc(inact[i][0])+'</span>';h+='</div>';}
  panel.innerHTML=h;
}

showOverview();
})();
</script>
</body>
